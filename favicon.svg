<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="starGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#FFE066;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#C9A84C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <rect width="100" height="100" fill="#0A0806" rx="12"/>
  <!-- Soft glow behind star -->
  <polygon points="50,10 61,35 88,38 68,57 74,84 50,70 26,84 32,57 12,38 39,35"
    fill="rgba(201,168,76,0.25)" filter="url(#glow)" transform="scale(1.15) translate(-6.5,-6.5)"/>
  <!-- Star -->
  <polygon points="50,10 61,35 88,38 68,57 74,84 50,70 26,84 32,57 12,38 39,35"
    fill="url(#starGrad)" filter="url(#glow)"/>
</svg>