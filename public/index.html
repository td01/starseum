<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starseum</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:rgba(201,168,76,0.2);--gold3:rgba(201,168,76,0.06);
  --cream:#F0E6CC;--dark:#0C0A07;--card:#18140F;--card2:#221C12;
  --txt:#DDD5BE;--muted:#6A6050;--muted2:#3A3428;
  --serif:'Cormorant Garamond',Georgia,serif;
  --display:'Cinzel',serif;--mono:'DM Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--txt);-webkit-font-smoothing:antialiased;}

/* ═══════════════════════════════════
   MOSAIC
═══════════════════════════════════ */
#mosaicScreen{position:fixed;inset:0;overflow:hidden;z-index:1;cursor:crosshair;}
#mosaicCanvas{position:absolute;top:0;left:0;will-change:transform;}

.star-tile{
  position:absolute;overflow:hidden;cursor:pointer;
  background:#0e0c09;
  transition:box-shadow .4s;
}
.star-tile:hover{box-shadow:0 0 0 1px rgba(201,168,76,0.5),0 0 30px rgba(201,168,76,0.08);}
.star-tile img{
  width:100%;height:100%;object-fit:cover;object-position:center top;
  filter:grayscale(30%) brightness(0.75) contrast(1.1);
  transition:filter .6s,transform .6s cubic-bezier(.25,.46,.45,.94);
  display:block;pointer-events:none;
  transform-origin:center center;
}
.star-tile:hover img{filter:grayscale(0%) brightness(.92) contrast(1.05);transform:scale(1.06);}
.star-tile-vig{
  position:absolute;inset:0;
  background:linear-gradient(160deg,transparent 40%,rgba(0,0,0,.7) 100%);
  opacity:0;transition:opacity .4s;
}
.star-tile:hover .star-tile-vig{opacity:1;}
.star-tile-info{
  position:absolute;bottom:0;left:0;right:0;
  padding:.6rem .75rem .7rem;
  opacity:0;transform:translateY(6px);
  transition:opacity .35s,transform .35s;
}
.star-tile:hover .star-tile-info{opacity:1;transform:none;}
.star-tile-name{font-family:var(--display);font-size:10px;letter-spacing:.12em;color:var(--cream);line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.8);}
.star-tile-years{font-family:var(--mono);font-size:8px;color:var(--gold);margin-top:2px;opacity:.9;}
.star-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--card);}
.star-ph-init{font-family:var(--display);font-size:2.8rem;color:rgba(201,168,76,0.15);}

.mosaic-hud{
  position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;
  padding:1.2rem 1.8rem;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(12,10,7,.85) 0%,transparent 100%);
}
.mosaic-logo{font-family:var(--display);font-size:1rem;letter-spacing:.3em;color:var(--cream);font-weight:600;}
.mosaic-logo em{color:var(--gold);font-style:normal;font-size:.55em;vertical-align:super;letter-spacing:.2em;}
.mosaic-hint{font-family:var(--mono);font-size:8px;letter-spacing:.15em;color:var(--muted);}

/* ═══════════════════════════════════
   ZOOM CINEMATIC TRANSITION
═══════════════════════════════════ */
#zoomCanvas{
  position:fixed;inset:0;z-index:50;
  pointer-events:none;display:none;
  overflow:hidden;
}
#zoomImg{
  position:absolute;
  object-fit:cover;
  transform-origin:center center;
  filter:brightness(.75) contrast(1.1);
  transition:none;
}
#zoomVignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 0%,rgba(12,10,7,0.0) 30%,rgba(12,10,7,1) 100%);
  opacity:0;
}
#zoomDark{
  position:fixed;inset:0;z-index:60;
  background:var(--dark);opacity:0;pointer-events:none;
  transition:opacity .4s ease;
}

/* ═══════════════════════════════════
   LOAD SCREEN
═══════════════════════════════════ */
#loadScreen{
  position:fixed;inset:0;z-index:200;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:var(--dark);
}
#loadScreen.on{display:flex;}
.lp-img{
  width:100px;height:130px;object-fit:cover;object-position:center top;
  border:1px solid var(--gold2);margin-bottom:1.8rem;
  filter:grayscale(20%) sepia(.1);
  animation:fadeScaleIn .5s ease both;
}
@keyframes fadeScaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:none}}
.lp-name{font-family:var(--display);font-size:clamp(1.6rem,4vw,2.4rem);color:var(--cream);letter-spacing:.15em;margin-bottom:.25rem;animation:fadeScaleIn .5s .1s ease both;}
.lp-dates{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.18em;margin-bottom:2rem;animation:fadeScaleIn .5s .2s ease both;}
.lp-track{width:200px;height:1px;background:rgba(201,168,76,.1);margin-bottom:1rem;overflow:hidden;animation:fadeScaleIn .4s .3s ease both;}
.lp-fill{height:100%;background:var(--gold);width:0%;transition:width .5s ease;}
.lp-step{font-family:var(--mono);font-size:8px;letter-spacing:.22em;color:var(--muted);animation:fadeScaleIn .4s .35s ease both;}
.lp-err{color:#b06040;font-size:13px;margin-top:1.5rem;font-family:var(--serif);font-style:italic;text-align:center;max-width:340px;line-height:1.6;}

/* ═══════════════════════════════════
   TIMELINE — IMMERSIVE 3D SCROLL
═══════════════════════════════════ */
#tlScreen{
  position:fixed;inset:0;z-index:200;display:none;
  background:var(--dark);overflow:hidden;
}
#tlScreen.on{display:block;}

/* Top bar */
.tl-bar{
  position:absolute;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:center;gap:1rem;
  padding:.75rem 1.5rem;
  background:linear-gradient(to bottom,rgba(12,10,7,.97) 60%,transparent 100%);
  backdrop-filter:blur(8px);
}
.tl-back{background:none;border:none;cursor:pointer;font-family:var(--display);font-size:8px;letter-spacing:2.5px;color:var(--muted);padding:0;transition:color .2s;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.tl-back:hover{color:var(--gold);}
.tl-info{flex:1;min-width:0;}
.tl-name{font-family:var(--display);font-size:clamp(.9rem,2.5vw,1.25rem);font-weight:600;color:var(--cream);letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-meta{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:1px;letter-spacing:.08em;}
.tl-tagline{font-family:var(--serif);font-style:italic;font-size:.82rem;color:var(--muted);max-width:280px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}

/* The scroll container — vertical now for immersion */
#tlScroll{
  position:absolute;inset:0;
  overflow-y:auto;overflow-x:hidden;
  scroll-behavior:smooth;
  scrollbar-width:thin;scrollbar-color:var(--gold2) transparent;
}
#tlScroll::-webkit-scrollbar{width:3px;}
#tlScroll::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:2px;}

/* Hero section */
.tl-hero{
  position:relative;height:100vh;
  display:flex;align-items:flex-end;
  overflow:hidden;flex-shrink:0;
}
.tl-hero-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center top;
  transform-origin:center center;
  transition:transform .1s linear;
  filter:brightness(.45) contrast(1.1) sepia(.15);
}
.tl-hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(12,10,7,1) 0%,rgba(12,10,7,.3) 50%,rgba(12,10,7,.05) 100%);
}
.tl-hero-content{
  position:relative;z-index:2;
  padding:3rem 4rem 4rem;
  width:100%;
}
.tl-hero-name{
  font-family:var(--display);
  font-size:clamp(3rem,8vw,6rem);
  font-weight:600;color:var(--cream);
  letter-spacing:.1em;line-height:.95;
  margin-bottom:.6rem;
  text-shadow:0 2px 40px rgba(0,0,0,.5);
}
.tl-hero-dates{
  font-family:var(--mono);font-size:clamp(.8rem,1.5vw,1rem);
  color:var(--gold);letter-spacing:.2em;margin-bottom:.6rem;
}
.tl-hero-tagline{
  font-family:var(--serif);font-style:italic;
  font-size:clamp(1rem,2vw,1.35rem);
  color:rgba(240,230,204,.65);max-width:560px;line-height:1.55;
}
.tl-hero-scroll{
  position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:.4rem;
  animation:pulse 2s infinite;pointer-events:none;
}
@keyframes pulse{0%,100%{opacity:.4;transform:translateX(-50%) translateY(0)}50%{opacity:1;transform:translateX(-50%) translateY(4px)}}
.tl-hero-scroll::after{content:'↓';font-size:14px;color:var(--gold);}

/* Timeline spine + events */
.tl-events-wrap{
  position:relative;
  padding:0 0 6rem;
}

/* Central spine */
.tl-spine{
  position:absolute;left:50%;top:0;bottom:0;
  width:1px;
  background:linear-gradient(to bottom,transparent,var(--gold2) 5%,var(--gold2) 95%,transparent);
  transform:translateX(-50%);
  pointer-events:none;
}

/* Individual event */
.tl-event{
  display:flex;align-items:flex-start;
  padding:4rem 0;
  position:relative;
  opacity:0;transform:translateY(40px);
  transition:opacity .8s ease,transform .8s ease;
}
.tl-event.visible{opacity:1;transform:none;}

/* Alternating left/right */
.tl-event.left{flex-direction:row-reverse;}
.tl-event.right{flex-direction:row;}

/* The content side */
.tl-ev-content{
  width:calc(50% - 50px);
  padding:0 2.5rem;
}
.tl-event.left .tl-ev-content{text-align:right;}

/* The spine connector */
.tl-ev-spine{
  width:100px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
  padding-top:.5rem;position:relative;
}
.tl-ev-dot{
  width:10px;height:10px;border-radius:50%;
  border:1.5px solid var(--gold);
  background:var(--dark);
  box-shadow:0 0 0 3px rgba(201,168,76,.1);
  z-index:2;flex-shrink:0;
}
.tl-ev-dot.death{
  background:var(--gold);
  box-shadow:0 0 0 4px rgba(201,168,76,.15),0 0 20px rgba(201,168,76,.3);
  width:14px;height:14px;
}
.tl-ev-year-badge{
  position:absolute;top:-1.2rem;
  font-family:var(--mono);font-size:9px;
  color:var(--gold);letter-spacing:.1em;
  white-space:nowrap;
}

/* The empty side */
.tl-ev-empty{width:calc(50% - 50px);}

/* Card */
.tl-ev-card{
  background:var(--card);
  border:1px solid var(--gold2);
  border-radius:2px;
  overflow:hidden;
  transform:perspective(800px) rotateY(0deg);
  transition:transform .4s ease,border-color .3s,box-shadow .3s;
}
.tl-event.left .tl-ev-card{transform-origin:right center;}
.tl-event.right .tl-ev-card{transform-origin:left center;}
.tl-ev-card:hover{
  border-color:rgba(201,168,76,.45);
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.1);
}
.tl-event.left .tl-ev-card:hover{transform:perspective(800px) rotateY(-2deg) translateX(-4px);}
.tl-event.right .tl-ev-card:hover{transform:perspective(800px) rotateY(2deg) translateX(4px);}

.tl-ev-img{
  width:100%;height:200px;
  object-fit:cover;object-position:center top;
  display:block;
  filter:sepia(.06) contrast(1.06) brightness(.9);
  transition:filter .4s,transform .4s;
}
.tl-ev-card:hover .tl-ev-img{filter:sepia(0) contrast(1.08) brightness(.95);transform:scale(1.02);}

.tl-ev-body{padding:.9rem 1.1rem 1rem;}
.tl-ev-type{font-family:var(--display);font-size:7px;letter-spacing:.3em;color:var(--gold);opacity:.6;margin-bottom:.3rem;}
.tl-ev-title{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--cream);line-height:1.2;margin-bottom:.45rem;}
.tl-ev-text{font-family:var(--serif);font-size:.9rem;line-height:1.75;color:var(--txt);}
.tl-ev-quote{
  margin-top:.7rem;padding:.6rem .8rem;
  border-left:2px solid var(--gold);
  background:rgba(201,168,76,.04);
  font-family:var(--serif);font-style:italic;
  font-size:.85rem;color:var(--cream);line-height:1.55;
}
.tl-event.left .tl-ev-quote{border-left:none;border-right:2px solid var(--gold);}

/* YouTube */
.tl-ev-yt{width:100%;aspect-ratio:16/9;border:none;display:block;}
.tl-ev-yt-label{
  padding:.4rem .8rem;
  font-family:var(--mono);font-size:7.5px;letter-spacing:.12em;color:var(--muted);
  border-top:1px solid var(--gold2);
}

/* Full-width atmospheric image dividers */
.tl-divider{
  width:100%;height:40vh;min-height:200px;
  position:relative;overflow:hidden;
  margin:0;
}
.tl-divider img{
  width:100%;height:100%;object-fit:cover;object-position:center;
  filter:brightness(.35) contrast(1.1) sepia(.2);
}
.tl-divider-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to right,rgba(12,10,7,.7) 0%,transparent 30%,transparent 70%,rgba(12,10,7,.7) 100%);
}
.tl-divider-year{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-family:var(--display);font-size:clamp(3rem,8vw,6rem);
  color:rgba(201,168,76,0.15);letter-spacing:.3em;
  font-weight:600;white-space:nowrap;pointer-events:none;
}

/* Bottom scrubber */
.tl-scrub{
  position:fixed;bottom:0;left:0;right:0;z-index:25;
  display:flex;align-items:center;
  padding:0 1.5rem;height:36px;
  background:rgba(12,10,7,.93);
  border-top:1px solid var(--gold2);
  backdrop-filter:blur(8px);
  overflow-x:auto;scrollbar-width:none;
}
.tl-scrub::-webkit-scrollbar{display:none;}
.tl-scrub-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--muted2);flex-shrink:0;cursor:pointer;
  transition:background .2s,transform .2s;margin:0 3px;
}
.tl-scrub-dot:hover,.tl-scrub-dot.active{background:var(--gold);transform:scale(1.4);}
.tl-scrub-label{
  font-family:var(--mono);font-size:7px;letter-spacing:.1em;
  color:var(--muted);margin:0 .8rem;white-space:nowrap;flex-shrink:0;
}
</style>
</head>
<body>

<!-- MOSAIC -->
<div id="mosaicScreen">
  <div id="mosaicCanvas"></div>
  <div class="mosaic-hud">
    <div class="mosaic-logo">STARSEUM<em>AI</em></div>
    <div class="mosaic-hint">MOVE TO EDGE · CLICK TO ENTER</div>
  </div>
</div>

<!-- CINEMATIC ZOOM -->
<div id="zoomCanvas">
  <img id="zoomImg" src="" alt="">
  <div id="zoomVignette"></div>
</div>
<div id="zoomDark"></div>

<!-- LOAD -->
<div id="loadScreen">
  <img class="lp-img" id="lpImg" src="" alt="">
  <div class="lp-name" id="lpName"></div>
  <div class="lp-dates" id="lpDates"></div>
  <div class="lp-track"><div class="lp-fill" id="lpFill"></div></div>
  <div class="lp-step" id="lpStep">GATHERING RECORDS</div>
  <div class="lp-err" id="lpErr"></div>
</div>

<!-- TIMELINE -->
<div id="tlScreen">
  <div class="tl-bar">
    <button class="tl-back" id="tlBack">← MUSEUM</button>
    <div class="tl-info">
      <div class="tl-name" id="tlName"></div>
      <div class="tl-meta" id="tlMeta"></div>
    </div>
    <div class="tl-tagline" id="tlTagline"></div>
  </div>
  <div id="tlScroll">
    <!-- filled by JS -->
  </div>
  <div class="tl-scrub" id="tlScrub"></div>
</div>

<script>
// ══════════════════════════════════════
//  STAR DATA
// ══════════════════════════════════════
const STARS = [
  {name:"James Dean",slug:"James_Dean",years:"1931–1955"},
  {name:"Marilyn Monroe",slug:"Marilyn_Monroe",years:"1926–1962"},
  {name:"Audrey Hepburn",slug:"Audrey_Hepburn",years:"1929–1993"},

  {name:"Kobe Bryant",slug:"Kobe_Bryant",years:"1978–2020"},
  {name:"Chadwick Boseman",slug:"Chadwick_Boseman",years:"1976–2020"},
  {name:"Diego Maradona",slug:"Diego_Maradona",years:"1960–2020"},
  {name:"Paul Walker",slug:"Paul_Walker",years:"1973–2013"},

  {name:"Pelé",slug:"Pel%C3%A9",years:"1940–2022"},
  {name:"Anthony Bourdain",slug:"Anthony_Bourdain",years:"1956–2018"},
  {name:"Notorious B.I.G.",slug:"The_Notorious_B.I.G.",years:"1972–1997"},
  {name:"Bill Withers",slug:"Bill_Withers",years:"1938–2020"},
  {name:"Marlon Brando",slug:"Marlon_Brando",years:"1924–2004"},
  {name:"Michael Jackson",slug:"Michael_Jackson",years:"1958–2009"},
  {name:"Frank Sinatra",slug:"Frank_Sinatra",years:"1915–1998"},
  {name:"Billie Holiday",slug:"Billie_Holiday",years:"1915–1959"},
  {name:"Miles Davis",slug:"Miles_Davis",years:"1926–1991"},
  {name:"Aretha Franklin",slug:"Aretha_Franklin",years:"1942–2018"},
  {name:"Johnny Cash",slug:"Johnny_Cash",years:"1932–2003"},
  {name:"Maya Angelou",slug:"Maya_Angelou",years:"1928–2014"},
  {name:"Martin Luther King Jr.",slug:"Martin_Luther_King_Jr.",years:"1929–1968"},
  {name:"Malcolm X",slug:"Malcolm_X",years:"1925–1965"},
  {name:"Che Guevara",slug:"Che_Guevara",years:"1928–1967"},
  {name:"John F. Kennedy",slug:"John_F._Kennedy",years:"1917–1963"},
  {name:"Albert Einstein",slug:"Albert_Einstein",years:"1879–1955"},
  {name:"Marie Curie",slug:"Marie_Curie",years:"1867–1934"},
  {name:"Nikola Tesla",slug:"Nikola_Tesla",years:"1856–1943"},
  {name:"Steve Jobs",slug:"Steve_Jobs",years:"1955–2011"},
  {name:"Pablo Picasso",slug:"Pablo_Picasso",years:"1881–1973"},
  {name:"Frida Kahlo",slug:"Frida_Kahlo",years:"1907–1954"},
  {name:"Salvador Dali",slug:"Salvador_Dalí",years:"1904–1989"},
  {name:"Coco Chanel",slug:"Coco_Chanel",years:"1883–1971"},
  {name:"Charlie Chaplin",slug:"Charlie_Chaplin",years:"1889–1977"},
  {name:"Humphrey Bogart",slug:"Humphrey_Bogart",years:"1899–1957"},
  {name:"Ernest Hemingway",slug:"Ernest_Hemingway",years:"1899–1961"},
  {name:"Winston Churchill",slug:"Winston_Churchill",years:"1874–1965"},
  {name:"Napoleon Bonaparte",slug:"Napoleon",years:"1769–1821"},
  {name:"Leonardo da Vinci",slug:"Leonardo_da_Vinci",years:"1452–1519"},
  {name:"Janis Joplin",slug:"Janis_Joplin",years:"1943–1970"}, // intentional dup for grid variety
];

// ══════════════════════════════════════
//  MOSAIC — infinite, edge-autopan
// ══════════════════════════════════════
const TW = 195, TH = 255, TGAP = 3;
const STEP_X = TW + TGAP, STEP_Y = TH + TGAP;
const GRID_COLS = 9; // virtual columns before repeating pattern

const mCanvas = document.getElementById('mosaicCanvas');
let camX = 0, camY = 0, velX = 0, velY = 0;
let isDrag = false, didDrag = false;
let dX0, dY0, cX0, cY0, lastDX, lastDY;
let autoPX = 0, autoPY = 0;
let mActive = true, rafId;
let thumbs = {}; // slug → url
const rendered = new Set(); // "col,row" already created

// Map (col,row) → unique star without duplication on same row
function starAt(col, row) {
  // shuffle cols differently per row using row as offset
  const rowOffset = (row * 7 + row * row * 3) % STARS.length;
  const colOffset = (col * 13) % STARS.length;
  return STARS[(rowOffset + colOffset) % STARS.length];
}

function mosaicInit() {
  renderTiles();
  startMosaicLoop();

  const ms = document.getElementById('mosaicScreen');

  // Desktop mouse drag
  ms.addEventListener('mousedown', e => {
    isDrag = true; didDrag = false;
    dX0 = e.clientX; dY0 = e.clientY;
    cX0 = camX; cY0 = camY;
    lastDX = e.clientX; lastDY = e.clientY;
    velX = 0; velY = 0;
    mCanvas.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!isDrag) {
      // edge auto-pan — move camera when mouse near edge
      // INVERTED: mouse near right → camera moves right (content moves left, as expected)
      const vw = window.innerWidth, vh = window.innerHeight;
      const zone = 120, spd = 6;
      const x = e.clientX, y = e.clientY;
      autoPX = x < zone ? -spd * Math.pow((zone-x)/zone, 1.4)
             : x > vw-zone ? spd * Math.pow((x-(vw-zone))/zone, 1.4) : 0;
      autoPY = y < zone ? -spd * Math.pow((zone-y)/zone, 1.4)
             : y > vh-zone ? spd * Math.pow((y-(vh-zone))/zone, 1.4) : 0;
      return;
    }
    const dx = e.clientX - dX0, dy = e.clientY - dY0;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) didDrag = true;
    velX = e.clientX - lastDX; velY = e.clientY - lastDY;
    lastDX = e.clientX; lastDY = e.clientY;
    camX = cX0 + dx; camY = cY0 + dy;
  });
  window.addEventListener('mouseup', () => { isDrag = false; mCanvas.style.cursor = ''; });
  ms.addEventListener('mouseleave', () => { autoPX = 0; autoPY = 0; });

  // Mobile touch
  let tX0, tY0, tCX0, tCY0, tLX, tLY, tMoved = false;
  ms.addEventListener('touchstart', e => {
    const t = e.touches[0];
    isDrag = true; didDrag = false; tMoved = false;
    tX0 = t.clientX; tY0 = t.clientY;
    tCX0 = camX; tCY0 = camY;
    tLX = t.clientX; tLY = t.clientY;
    velX = 0; velY = 0;
  }, {passive:true});
  ms.addEventListener('touchmove', e => {
    if (!isDrag) return;
    const t = e.touches[0];
    const dx = t.clientX - tX0, dy = t.clientY - tY0;
    if (Math.abs(dx)>8||Math.abs(dy)>8){didDrag=true;tMoved=true;}
    velX = t.clientX - tLX; velY = t.clientY - tLY;
    tLX = t.clientX; tLY = t.clientY;
    camX = tCX0 + dx; camY = tCY0 + dy;
  }, {passive:true});
  ms.addEventListener('touchend', e => {
    isDrag = false;
    if (!tMoved && e.changedTouches[0]) {
      const t = e.changedTouches[0];
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const tile = el?.closest?.('.star-tile');
      if (tile?._star) enterStar(tile._star, tile);
    }
  });
}

function startMosaicLoop() {
  function loop() {
    if (!mActive) return;
    if (!isDrag) {
      // momentum
      velX *= 0.9; velY *= 0.9;
      if (Math.abs(velX) > 0.05 || Math.abs(velY) > 0.05) { camX += velX; camY += velY; }
      // autopan (additive on top of momentum)
      if (autoPX || autoPY) { camX += autoPX; camY += autoPY; velX=0; velY=0; }
    }
    mCanvas.style.transform = `translate(${Math.round(camX)}px,${Math.round(camY)}px)`;
    renderTiles();
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

function renderTiles() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const buf = 2;
  const c0 = Math.floor((-camX - buf*STEP_X) / STEP_X);
  const c1 = Math.ceil((-camX + vw + buf*STEP_X) / STEP_X);
  const r0 = Math.floor((-camY - buf*STEP_Y) / STEP_Y);
  const r1 = Math.ceil((-camY + vh + buf*STEP_Y) / STEP_Y);
  for (let r = r0; r <= r1; r++) {
    for (let c = c0; c <= c1; c++) {
      const key = `${c},${r}`;
      if (rendered.has(key)) continue;
      rendered.add(key);
      makeTile(starAt(c, r), c * STEP_X, r * STEP_Y);
    }
  }
}

function makeTile(star, tx, ty) {
  const tile = document.createElement('div');
  tile.className = 'star-tile';
  tile.style.cssText = `left:${tx}px;top:${ty}px;width:${TW}px;height:${TH}px;`;
  tile._star = star;

  const ph = document.createElement('div'); ph.className = 'star-ph';
  ph.innerHTML = `<div class="star-ph-init">${star.name[0]}</div>`;
  tile.appendChild(ph);
  tile.appendChild(Object.assign(document.createElement('div'), {className:'star-tile-vig'}));
  const info = document.createElement('div'); info.className = 'star-tile-info';
  info.innerHTML = `<div class="star-tile-name">${star.name}</div><div class="star-tile-years">${star.years}</div>`;
  tile.appendChild(info);

  tile.addEventListener('click', () => { if (!didDrag) enterStar(star, tile); });
  mCanvas.appendChild(tile);

  const src = thumbs[star.slug];
  if (src) { injectThumb(tile, ph, src); return; }
  fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(star.slug)}`)
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (!d?.thumbnail?.source) return;
      thumbs[star.slug] = d.thumbnail.source;
      // update all tiles for this star
      mCanvas.querySelectorAll('.star-tile').forEach(t => {
        if (t._star?.slug === star.slug) {
          const p = t.querySelector('.star-ph');
          if (p) injectThumb(t, p, d.thumbnail.source);
        }
      });
    }).catch(() => {});
}

function injectThumb(tile, ph, src) {
  if (!ph?.parentNode) return;
  const img = document.createElement('img');
  img.src = src;
  img.onload = () => { if (ph.parentNode) ph.replaceWith(img); };
}

// ══════════════════════════════════════
//  CINEMATIC ZOOM TRANSITION
// ══════════════════════════════════════
function enterStar(star, tile) {
  mActive = false; cancelAnimationFrame(rafId);
  autoPX = 0; autoPY = 0;

  const thumb = thumbs[star.slug] || null;
  const rect = tile.getBoundingClientRect();

  if (thumb) {
    // Set up zoom image at tile position/size
    const zc = document.getElementById('zoomCanvas');
    const zi = document.getElementById('zoomImg');
    const zv = document.getElementById('zoomVignette');
    zc.style.display = 'block';
    zi.src = thumb;
    zi.style.cssText = `left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;transition:none;`;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        // Animate: expand image to fill screen + zoom in
        const scaleX = window.innerWidth / rect.width;
        const scaleY = window.innerHeight / rect.height;
        const scale = Math.max(scaleX, scaleY) * 2.5;
        const tx = window.innerWidth/2 - (rect.left + rect.width/2);
        const ty = window.innerHeight/2 - (rect.top + rect.height/2);

        zi.style.transition = 'transform 1s cubic-bezier(.4,0,.2,1), filter 1s ease';
        zi.style.transformOrigin = 'center center';
        zi.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
        zi.style.filter = 'brightness(.2) contrast(1.1) sepia(.2)';
        zv.style.transition = 'opacity .8s .1s ease';
        zv.style.opacity = '1';

        // Fade to dark
        setTimeout(() => {
          const zd = document.getElementById('zoomDark');
          zd.style.pointerEvents = 'all';
          zd.style.opacity = '1';
        }, 600);

        setTimeout(() => {
          zc.style.display = 'none';
          zi.style.transform = '';
          zv.style.opacity = '0';
          document.getElementById('mosaicScreen').style.display = 'none';
          startJourney(star, thumb);
        }, 1000);
      });
    });
  } else {
    const zd = document.getElementById('zoomDark');
    zd.style.pointerEvents = 'all';
    zd.style.opacity = '1';
    setTimeout(() => {
      document.getElementById('mosaicScreen').style.display = 'none';
      startJourney(star, null);
    }, 500);
  }
}

// ══════════════════════════════════════
//  LOADING
// ══════════════════════════════════════
function showLoad(star, thumb) {
  document.getElementById('loadScreen').classList.add('on');
  const img = document.getElementById('lpImg');
  if (thumb) { img.src = thumb; img.style.display = 'block'; } else img.style.display = 'none';
  document.getElementById('lpName').textContent = star.name.toUpperCase();
  document.getElementById('lpDates').textContent = star.years || '';
  document.getElementById('lpErr').textContent = '';
  setLoad(5, 'GATHERING RECORDS');
}
function setLoad(p, s) {
  document.getElementById('lpFill').style.width = p + '%';
  if (s) document.getElementById('lpStep').textContent = s;
}
function hideLoad() { document.getElementById('loadScreen').classList.remove('on'); }

// ══════════════════════════════════════
//  JOURNEY
// ══════════════════════════════════════
async function startJourney(star, thumb) {
  showLoad(star, thumb);
  try {
    setLoad(20, 'CURATING TIMELINE');
    const tl = await fetchTimeline(star.name);
    setLoad(55, 'SOURCING PHOTOGRAPHS');
    const wiki = await fetchWikiImages(tl.wikipediaSlug || star.slug);
    setLoad(85, 'BUILDING EXHIBITION');
    await sleep(250);
    setLoad(100, '');
    await sleep(150);
    hideLoad();
    buildTimeline(star, tl, wiki, thumb);
    document.getElementById('tlScreen').classList.add('on');
    const zd = document.getElementById('zoomDark');
    zd.style.opacity = '0';
    setTimeout(() => { zd.style.pointerEvents = 'none'; }, 600);
    initScrollReveal();
    initParallax();
  } catch(err) {
    console.error(err);
    document.getElementById('lpErr').textContent = err.message || 'Could not load. Please try again.';
    setLoad(0, 'ERROR');
    setTimeout(goHome, 3500);
  }
}

function goHome() {
  document.getElementById('tlScreen').classList.remove('on');
  document.getElementById('loadScreen').classList.remove('on');
  document.getElementById('mosaicScreen').style.display = 'block';
  document.getElementById('zoomDark').style.opacity = '0';
  setTimeout(() => { document.getElementById('zoomDark').style.pointerEvents = 'none'; }, 500);
  mActive = true; velX = 0; velY = 0;
  startMosaicLoop();
}
document.getElementById('tlBack').addEventListener('click', goHome);

// ══════════════════════════════════════
//  API: CLAUDE
// ══════════════════════════════════════
async function fetchTimeline(name) {
  const r = await fetch('/.netlify/functions/claude', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error||`Error ${r.status}`); }
  const data = await r.json();
  const raw = data.content?.find(b=>b.type==='text')?.text||'{}';
  return JSON.parse(raw.replace(/^```json\s*|^```\s*|```\s*$/gm,'').trim());
}

// ══════════════════════════════════════
//  API: WIKIPEDIA
// ══════════════════════════════════════
async function fetchWikiImages(slug) {
  const s = slug.replace(/ /g,'_');
  const out = {thumb:null, images:[]};
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(s)}`);
    if (r.ok) { const d = await r.json(); out.thumb = d.thumbnail?.source||null; }
  } catch(e){}
  try {
    const r = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(s)}&prop=images&imlimit=24&format=json&origin=*`);
    if (r.ok) {
      const d = await r.json();
      const pg = Object.values(d.query?.pages||{})[0];
      const files = (pg?.images||[])
        .filter(i=>/\.(jpg|jpeg|png)$/i.test(i.title))
        .filter(i=>!/icon|logo|flag|map|signature|commons|arrow|button|blank|edit|grey|gray|lock|ribbon|seal|stub|wikimedia/i.test(i.title))
        .slice(0,16).map(i=>i.title.replace('File:',''));
      const urls = await Promise.all(files.map(resolveImg));
      out.images = urls.filter(Boolean);
    }
  } catch(e){}
  return out;
}

async function resolveImg(f) {
  try {
    const r = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=File:${encodeURIComponent(f)}&prop=imageinfo&iiprop=url&format=json&origin=*`);
    const d = await r.json();
    const url = Object.values(d.query?.pages||{})[0]?.imageinfo?.[0]?.url||null;
    return (url&&/\.(jpg|jpeg|png)$/i.test(url))?url:null;
  } catch(e){return null;}
}

// ══════════════════════════════════════
//  BUILD TIMELINE
// ══════════════════════════════════════
function buildTimeline(star, tl, wiki, heroThumb) {
  const fullName = tl.fullName || star.name;
  const diedPart = tl.died ? ` – ${tl.died}` : '';
  document.getElementById('tlName').textContent = fullName;
  document.getElementById('tlMeta').textContent = [tl.born?`${tl.born}${diedPart}`:'', (tl.fields||[]).join(' & '), tl.nationality].filter(Boolean).join(' · ');
  document.getElementById('tlTagline').textContent = tl.tagline || '';

  const allImgs = [heroThumb, wiki.thumb, ...wiki.images].filter((v,i,a)=>v&&a.indexOf(v)===i);
  const events = tl.events || [];

  const scroll = document.getElementById('tlScroll');
  scroll.innerHTML = '';

  // ── HERO ──
  const hero = document.createElement('div');
  hero.className = 'tl-hero';
  const heroBg = document.createElement('div');
  heroBg.className = 'tl-hero-bg';
  heroBg.style.backgroundImage = `url('${allImgs[0]||''}')`;
  heroBg.dataset.parallax = '0.4';
  hero.appendChild(heroBg);
  hero.innerHTML += `<div class="tl-hero-grad"></div>`;
  const hc = document.createElement('div'); hc.className = 'tl-hero-content';
  hc.innerHTML = `
    <div class="tl-hero-name">${fullName}</div>
    <div class="tl-hero-dates">${tl.born||''}${diedPart}</div>
    <div class="tl-hero-tagline">${tl.tagline||''}</div>
  `;
  hero.appendChild(hc);
  hero.innerHTML += `<div class="tl-hero-scroll">SCROLL TO EXPLORE</div>`;
  scroll.appendChild(hero);

  // ── EVENTS ──
  const evWrap = document.createElement('div');
  evWrap.className = 'tl-events-wrap';
  evWrap.innerHTML = '<div class="tl-spine"></div>';

  const scrub = document.getElementById('tlScrub');
  scrub.innerHTML = '';

  events.forEach((ev, i) => {
    // Full-width atmospheric divider every 3 events
    if (i > 0 && i % 3 === 0 && allImgs[i]) {
      const div = document.createElement('div');
      div.className = 'tl-divider';
      div.innerHTML = `<img src="${allImgs[i]}" alt="" loading="lazy" onerror="this.closest('.tl-divider').remove()">
        <div class="tl-divider-overlay"></div>
        <div class="tl-divider-year">${ev.year||''}</div>`;
      evWrap.appendChild(div);
    }

    const side = i % 2 === 0 ? 'right' : 'left';
    const evDiv = document.createElement('div');
    evDiv.className = `tl-event ${side}`;
    evDiv.dataset.evIdx = i;

    // content
    const content = document.createElement('div');
    content.className = 'tl-ev-content';

    const card = document.createElement('div');
    card.className = 'tl-ev-card';

    const imgSrc = allImgs[(i + 1) % allImgs.length];
    if (imgSrc && ev.type !== 'death') {
      const ci = document.createElement('img');
      ci.className = 'tl-ev-img';
      ci.src = imgSrc; ci.alt = ev.title; ci.loading = 'lazy';
      ci.onerror = () => ci.remove();
      card.appendChild(ci);
    }

    // YouTube on death event
    if (ev.type === 'death' || i === events.length - 1) {
      const ytSrc = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent((tl.youtubeSearchTerms||[star.name+' documentary'])[0])}&rel=0&modestbranding=1`;
      const yt = document.createElement('iframe');
      yt.className = 'tl-ev-yt';
      yt.src = ytSrc; yt.allowFullscreen = true; yt.loading = 'lazy';
      yt.setAttribute('allow','accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture');
      card.appendChild(yt);
      card.innerHTML += `<div class="tl-ev-yt-label">DOCUMENTARY · YOUTUBE</div>`;
    }

    const body = document.createElement('div'); body.className = 'tl-ev-body';
    body.innerHTML = `
      <div class="tl-ev-type">${(ev.type||'').toUpperCase()}</div>
      <div class="tl-ev-title">${ev.title||''}</div>
      <div class="tl-ev-text">${ev.text||''}</div>
      ${ev.quote?`<div class="tl-ev-quote">"${ev.quote.replace(/^[""\u201C\u201D]|[""\u201C\u201D]$/g,'')}"</div>`:''}
    `;
    card.appendChild(body);
    content.appendChild(card);

    // spine
    const spine = document.createElement('div'); spine.className = 'tl-ev-spine';
    const dot = document.createElement('div');
    dot.className = `tl-ev-dot${ev.type==='death'?' death':''}`;
    const badge = document.createElement('div'); badge.className='tl-ev-year-badge';
    badge.textContent = ev.year||'';
    spine.appendChild(badge); spine.appendChild(dot);

    const empty = document.createElement('div'); empty.className = 'tl-ev-empty';

    if (side === 'right') { evDiv.appendChild(empty); evDiv.appendChild(spine); evDiv.appendChild(content); }
    else { evDiv.appendChild(content); evDiv.appendChild(spine); evDiv.appendChild(empty); }

    evWrap.appendChild(evDiv);

    // scrubber dot
    const dot2 = document.createElement('div');
    dot2.className = 'tl-scrub-dot';
    dot2.title = `${ev.year} ${ev.title}`;
    dot2.addEventListener('click', () => evDiv.scrollIntoView({behavior:'smooth',block:'center'}));
    if (i === 0) scrub.innerHTML = `<div class="tl-scrub-label">${tl.born||''}</div>`;
    scrub.appendChild(dot2);
    if (i === events.length - 1) scrub.innerHTML += `<div class="tl-scrub-label">${tl.died||''}</div>`;
  });

  scroll.appendChild(evWrap);
}

// ══════════════════════════════════════
//  SCROLL REVEAL
// ══════════════════════════════════════
let revealObs;
function initScrollReveal() {
  if (revealObs) revealObs.disconnect();
  revealObs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }});
  }, {threshold: 0.12, rootMargin: '0px 0px -60px 0px', root: document.getElementById('tlScroll')});
  document.querySelectorAll('.tl-event').forEach(el => revealObs.observe(el));

  // Scrubber active dot
  const dotObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const idx = e.target.dataset.evIdx;
      const dot = document.querySelectorAll('.tl-scrub-dot')[idx];
      if (dot) dot.classList.toggle('active', e.isIntersecting);
    });
  }, {threshold: 0.5, root: document.getElementById('tlScroll')});
  document.querySelectorAll('.tl-event').forEach(el => dotObs.observe(el));
}

// ══════════════════════════════════════
//  PARALLAX
// ══════════════════════════════════════
function initParallax() {
  const tlScroll = document.getElementById('tlScroll');
  tlScroll.addEventListener('scroll', () => {
    const scrolled = tlScroll.scrollTop;
    // Hero parallax
    const heroBg = document.querySelector('.tl-hero-bg');
    if (heroBg) heroBg.style.transform = `translateY(${scrolled * 0.35}px)`;
  }, {passive: true});
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
mosaicInit();
</script>
