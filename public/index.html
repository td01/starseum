<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Starseum — A Museum of Extraordinary Lives</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:rgba(201,168,76,0.2);
  --cream:#F0E6CC;--dark:#0A0806;--card:#14110C;
  --txt:#DDD5BE;--muted:#6A6050;--muted2:#3A3428;
  --serif:'Cormorant Garamond',Georgia,serif;
  --display:'Cinzel',serif;--mono:'DM Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);-webkit-font-smoothing:antialiased;}

/* ═══ MOSAIC ═══════════════════════════════════ */
#mosaicScreen{position:fixed;inset:0;overflow:hidden;z-index:1;}
#mosaicCanvas{position:absolute;top:0;left:0;will-change:transform;user-select:none;-webkit-user-select:none;}
.star-tile{position:absolute;overflow:hidden;cursor:pointer;background:#0e0b08;}
.star-tile img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:grayscale(25%) brightness(0.72) contrast(1.12);transition:filter 0.8s ease,transform 0.7s cubic-bezier(.25,.46,.45,.94);display:block;pointer-events:none;will-change:filter,transform;}
.star-tile[data-b="4"] img{filter:grayscale(0%) brightness(1.0) contrast(1.06);transform:scale(1.05);}
.star-tile[data-b="3"] img{filter:grayscale(10%) brightness(0.75) contrast(1.08);}
.star-tile[data-b="2"] img{filter:grayscale(30%) brightness(0.50) contrast(1.05);}
.star-tile[data-b="1"] img{filter:grayscale(50%) brightness(0.35) contrast(1.02);}
.star-tile[data-b="0"] img{filter:grayscale(65%) brightness(0.09) contrast(1.00);}
.star-tile-shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 55%);opacity:0;transition:opacity .35s;}
.star-tile[data-b="4"] .star-tile-shade{opacity:1;}
.star-tile-label{position:absolute;bottom:0;left:0;right:0;padding:.5rem .65rem .6rem;opacity:0;transform:translateY(4px);transition:opacity .3s,transform .3s;}
.star-tile[data-b="4"] .star-tile-label{opacity:1;transform:none;}
.stn{font-family:var(--display);font-size:9.5px;letter-spacing:.12em;color:var(--cream);line-height:1.25;text-shadow:0 1px 8px rgba(0,0,0,1);}
.sty{font-family:var(--mono);font-size:8px;color:var(--gold);margin-top:2px;opacity:.85;}
@media(max-width:600px){
  .star-tile-label{opacity:0!important;transform:none!important;}
  .star-tile[data-b="4"] .star-tile-label{opacity:0!important;}
  /* Centre tile label shown via JS class */
  .star-tile.mobile-centre .star-tile-label{opacity:1!important;transform:none!important;}
  .star-tile.mobile-centre .star-tile-shade{opacity:1!important;}
}
.star-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--card);}
.star-ph-i{font-family:var(--display);font-size:2.8rem;color:rgba(201,168,76,.1);}
.m-hud{position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;padding:1.1rem 1.8rem;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(10,8,6,.9) 0%,transparent);}
.m-logo{font-family:var(--display);font-size:.95rem;letter-spacing:.3em;color:var(--cream);font-weight:600;}
.m-logo em{color:var(--gold);font-style:normal;font-size:.5em;vertical-align:super;}
.m-hint{font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:var(--muted);opacity:.7;}


/* ═══ INTRO ════════════════════════════════ */
#intro{
  position:fixed;inset:0;z-index:1000;
  background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
}
#intro.done{display:none;}
.intro-logo{
  font-family:var(--display);
  font-size:clamp(2.5rem,8vw,5rem);
  font-weight:600;letter-spacing:.25em;
  color:var(--cream);
  opacity:0;
  transform:scale(0.88);
  animation:introIn 1.1s cubic-bezier(.16,1,.3,1) .3s forwards;
}
.intro-rule{
  width:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:.8rem auto;
  animation:introRule 1s ease .9s forwards;
}
.intro-sub{
  font-family:var(--serif);font-style:italic;
  font-size:1rem;letter-spacing:.06em;
  color:var(--muted);opacity:0;
  animation:introFade .8s ease 1.4s forwards;
}
@keyframes introIn{to{opacity:1;transform:scale(1);}}
@keyframes introRule{to{width:80px;}}
@keyframes introFade{to{opacity:.7;}}

/* ═══ TRANSITION ═══════════════════════════════ */
#transLayer{position:fixed;inset:0;z-index:40;pointer-events:none;display:none;}
#zoomDark{position:fixed;inset:0;z-index:50;background:var(--dark);opacity:0;pointer-events:none;transition:opacity .5s ease;}

/* ═══ LOAD ═════════════════════════════════════ */
#loadScreen{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;background:var(--dark);}
#loadScreen.on{display:flex;}
.lp-img{width:88px;height:116px;object-fit:cover;object-position:center top;border:1px solid var(--gold2);margin-bottom:1.6rem;filter:grayscale(10%) sepia(.08);}
.lp-name{font-family:var(--display);font-size:clamp(1.4rem,4vw,2.2rem);color:var(--cream);letter-spacing:.15em;margin-bottom:.2rem;}
.lp-dates{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.18em;margin-bottom:2rem;}
.lp-bar{width:160px;height:1px;background:rgba(201,168,76,.08);overflow:hidden;}
.lp-fill{height:100%;background:var(--gold);width:0%;transition:width .55s ease;}
.lp-step{font-family:var(--mono);font-size:8px;letter-spacing:.22em;color:var(--muted);margin-top:.75rem;}
.lp-err{color:#9a4030;font-size:13px;margin-top:1.5rem;font-family:var(--serif);font-style:italic;text-align:center;max-width:300px;line-height:1.6;}

/* ═══ TIMELINE ══════════════════════════════════ */
#tlScreen{position:fixed;inset:0;z-index:200;display:none;background:var(--dark);overflow:hidden;}
#tlScreen.on{display:block;}
#tlAmbient{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(60px) brightness(.1) saturate(1.4);transform:scale(1.1);pointer-events:none;z-index:0;}
.tl-bar{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;gap:1rem;padding:.7rem 1.5rem;background:linear-gradient(to bottom,rgba(10,8,6,.98) 65%,transparent);pointer-events:none;}
.tl-bar>*{pointer-events:auto;}
.tl-back{background:none;border:none;cursor:pointer;font-family:var(--display);font-size:8px;letter-spacing:2.5px;color:var(--muted);padding:0;transition:color .2s;}
.tl-back:hover{color:var(--gold);}
.tl-info{flex:1;min-width:0;}
.tl-sname{font-family:var(--display);font-size:clamp(.85rem,2vw,1.2rem);font-weight:600;color:var(--cream);letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-smeta{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:1px;letter-spacing:.07em;}
.tl-tagline{font-family:var(--serif);font-style:italic;font-size:.8rem;color:rgba(201,168,76,.6);max-width:260px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}

/* Horizontal scrollable strip */
#tlScroll{position:absolute;top:55px;bottom:36px;left:0;right:0;overflow-x:auto;overflow-y:hidden;z-index:10;scrollbar-width:none;cursor:grab;}
#tlScroll::-webkit-scrollbar{display:none;}
#tlScroll.grabbing{cursor:grabbing;}
#tlStrip{display:inline-flex;align-items:center;height:100%;padding:0 10vw;position:relative;min-width:100%;}
.tl-spine{position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.22) 5%,rgba(201,168,76,0.22) 95%,transparent);pointer-events:none;}

/* Cap */
.tl-cap{display:inline-flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;margin:0 24px;position:relative;z-index:2;}
.tl-cap-dot{width:14px;height:14px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(201,168,76,.1),0 0 20px rgba(201,168,76,.3);}
.tl-cap-yr{font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:.1em;white-space:nowrap;}
.tl-cap-lbl{font-family:var(--display);font-size:7px;letter-spacing:.22em;color:var(--muted);}

/* Event column */
.ev-col{display:inline-flex;flex-direction:column;align-items:center;flex-shrink:0;width:230px;margin:0 14px;position:relative;z-index:2;}
.ev-col.up{flex-direction:column-reverse;}
.ev-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--gold);background:var(--dark);flex-shrink:0;box-shadow:0 0 0 3px rgba(201,168,76,.08);}
.ev-dot.death{background:var(--gold);box-shadow:0 0 0 4px rgba(201,168,76,.12),0 0 16px rgba(201,168,76,.3);}
.ev-conn{width:1px;background:rgba(201,168,76,.2);flex-shrink:0;height:48px;}
.ev-card{background:#181410;border:1px solid rgba(201,168,76,.2);border-radius:2px;overflow:hidden;width:100%;cursor:pointer;transition:border-color .3s,box-shadow .3s,transform .3s;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.ev-card:hover{border-color:rgba(201,168,76,.45);box-shadow:0 12px 40px rgba(0,0,0,.7);transform:translateY(-3px);}
.ev-col.up .ev-card:hover{transform:translateY(3px);}
.ev-img{width:100%;height:120px;object-fit:cover;object-position:center top;display:block;filter:brightness(.85) contrast(1.05);transition:filter .4s;}
.ev-card:hover .ev-img{filter:brightness(.95) contrast(1.08);}
.ev-body{padding:.65rem .8rem .75rem;}
.ev-yr{font-family:var(--mono);font-size:8px;color:var(--gold);letter-spacing:.13em;margin-bottom:.15rem;}
.ev-type{font-family:var(--display);font-size:6.5px;letter-spacing:.28em;color:var(--muted);opacity:.6;margin-bottom:.2rem;}
.ev-title{font-family:var(--serif);font-size:.95rem;font-weight:600;color:var(--cream);line-height:1.2;margin-bottom:.3rem;}
.ev-text{font-family:var(--serif);font-size:.78rem;line-height:1.7;color:var(--txt);}
.ev-quote{margin-top:.5rem;padding:.4rem .6rem;border-left:2px solid var(--gold);background:rgba(201,168,76,.04);font-family:var(--serif);font-style:italic;font-size:.75rem;color:var(--cream);line-height:1.5;}
.ev-play-wrap{position:relative;}
.ev-play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.38);opacity:0;transition:opacity .3s;}
.ev-card:hover .ev-play-btn{opacity:1;}
.ev-play-btn svg{width:40px;height:40px;}

/* Scrubber */
.tl-scrub{position:absolute;bottom:0;left:0;right:0;z-index:25;height:36px;display:flex;align-items:center;padding:0 1.5rem;gap:.75rem;background:rgba(10,8,6,.94);border-top:1px solid var(--gold2);backdrop-filter:blur(8px);}
.tl-scrub-lbl{font-family:var(--mono);font-size:7.5px;color:var(--muted);letter-spacing:.08em;white-space:nowrap;flex-shrink:0;}
.tl-scrub-track{flex:1;height:2px;background:var(--muted2);border-radius:1px;position:relative;cursor:pointer;}
.tl-scrub-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,rgba(201,168,76,.3),var(--gold));border-radius:1px;}
.tl-scrub-thumb{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;background:var(--gold);border:1.5px solid var(--dark);transform:translate(-50%,-50%);box-shadow:0 0 6px rgba(201,168,76,.4);}

/* Zoom */
.tl-zoom{position:absolute;bottom:2.8rem;right:1.25rem;z-index:25;display:flex;flex-direction:column;gap:5px;}
.tl-zbtn{width:34px;height:34px;border-radius:50%;background:rgba(10,8,6,.88);border:1px solid var(--gold2);color:var(--gold);font-family:var(--mono);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px);user-select:none;}
.tl-zbtn:hover{background:rgba(201,168,76,.12);border-color:var(--gold);}
.tl-zbtn.sm{font-size:8px;}

/* Fullscreen btn */
.fs-btn{position:fixed;z-index:500;bottom:1.2rem;left:1.2rem;width:30px;height:30px;background:rgba(12,10,7,.7);border:1px solid var(--gold2);border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s;backdrop-filter:blur(4px);}
.fs-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.1);}
.fs-btn svg{width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;}

/* Disclaimer */
#disclaimer{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);z-index:500;font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;color:var(--muted);opacity:.5;pointer-events:none;white-space:nowrap;text-align:center;}

/* Video overlay */
#videoOverlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.96);display:none;align-items:center;justify-content:center;}
#videoOverlay.on{display:flex;}
#videoFrame{width:min(90vw,1280px);height:min(80vh,calc(min(90vw,1280px)*9/16));border:none;}
#videoClose{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:rgba(255,255,255,.5);font-size:28px;cursor:pointer;transition:color .2s;}
#videoClose:hover{color:#fff;}
</style>
</head>
<body>

<div id="intro">
  <div class="intro-logo">STARSEUM</div>
  <div class="intro-rule"></div>
  <div class="intro-sub">A museum of extraordinary lives</div>
</div>
<div id="mosaicScreen">
  <div id="mosaicCanvas"></div>
  <div class="m-hud">
    <div class="m-logo">STARSEUM<em>AI</em></div>
    <div class="m-hint">HOVER · CLICK TO ENTER</div>
  </div>
</div>

<div id="transLayer"><canvas id="holeCanvas"></canvas></div>
<div id="zoomDark"></div>

<div id="loadScreen">
  <img class="lp-img" id="lpImg" src="" alt="">
  <div class="lp-name" id="lpName"></div>
  <div class="lp-dates" id="lpDates"></div>
  <div class="lp-bar"><div class="lp-fill" id="lpFill"></div></div>
  <div class="lp-step" id="lpStep">GATHERING RECORDS</div>
  <div class="lp-err" id="lpErr"></div>
</div>

<div id="tlScreen">
  <div id="tlAmbient"></div>
  <div class="tl-bar">
    <button class="tl-back" id="tlBack">← MUSEUM</button>
    <div class="tl-info">
      <div class="tl-sname" id="tlName"></div>
      <div class="tl-smeta" id="tlMeta"></div>
    </div>
    <div class="tl-tagline" id="tlTagline"></div>
  </div>
  <div id="tlScroll">
    <div id="tlStrip">
      <div class="tl-spine"></div>
    </div>
  </div>
  <div class="tl-zoom">
    <div class="tl-zbtn" id="zIn">+</div>
    <div class="tl-zbtn" id="zOut">−</div>
    <div class="tl-zbtn sm" id="zFit">FIT</div>
  </div>
  <div class="tl-scrub">
    <div class="tl-scrub-lbl" id="scrubBirth"></div>
    <div class="tl-scrub-track" id="scrubTrack">
      <div class="tl-scrub-fill" id="scrubFill"></div>
      <div class="tl-scrub-thumb" id="scrubThumb"></div>
    </div>
    <div class="tl-scrub-lbl" id="scrubDeath"></div>
  </div>
</div>

<div id="videoOverlay">
  <button id="videoClose">✕</button>
  <iframe id="videoFrame" allowfullscreen allow="autoplay;fullscreen"></iframe>
</div>

<div class="fs-btn" id="fsBtn">
  <svg viewBox="0 0 16 16"><polyline points="1,5 1,1 5,1"/><polyline points="11,1 15,1 15,5"/><polyline points="15,11 15,15 11,15"/><polyline points="5,15 1,15 1,11"/></svg>
</div>

<div id="disclaimer">Content sourced from Wikipedia · Images via Wikimedia Commons · For educational purposes only</div>

<script>
// ═══════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════
const STARS=[
  {name:"James Dean",slug:"James_Dean",years:"1931–1955"},
  {name:"Marilyn Monroe",slug:"Marilyn_Monroe",years:"1926–1962"},
  {name:"Audrey Hepburn",slug:"Audrey_Hepburn",years:"1929–1993"},
  {name:"Elvis Presley",slug:"Elvis_Presley",years:"1935–1977"},
  {name:"Jimi Hendrix",slug:"Jimi_Hendrix",years:"1942–1970"},
  {name:"Janis Joplin",slug:"Janis_Joplin",years:"1943–1970"},
  {name:"Jim Morrison",slug:"Jim_Morrison",years:"1943–1971"},
  {name:"Bruce Lee",slug:"Bruce_Lee",years:"1940–1973"},
  {name:"John Lennon",slug:"John_Lennon",years:"1940–1980"},
  {name:"Bob Marley",slug:"Bob_Marley",years:"1945–1981"},
  {name:"Princess Diana",slug:"Diana,_Princess_of_Wales",years:"1961–1997"},
  {name:"Freddie Mercury",slug:"Freddie_Mercury",years:"1946–1991"},
  {name:"Kurt Cobain",slug:"Kurt_Cobain",years:"1967–1994"},
  {name:"Tupac Shakur",slug:"Tupac_Shakur",years:"1971–1996"},
  {name:"River Phoenix",slug:"River_Phoenix",years:"1970–1993"},
  {name:"Heath Ledger",slug:"Heath_Ledger",years:"1979–2008"},
  {name:"Amy Winehouse",slug:"Amy_Winehouse",years:"1983–2011"},
  {name:"Whitney Houston",slug:"Whitney_Houston",years:"1963–2012"},
  {name:"Robin Williams",slug:"Robin_Williams",years:"1951–2014"},
  {name:"David Bowie",slug:"David_Bowie",years:"1947–2016"},
  {name:"Prince",slug:"Prince_(musician)",years:"1958–2016"},
  {name:"Muhammad Ali",slug:"Muhammad_Ali",years:"1942–2016"},
  {name:"Michael Jackson",slug:"Michael_Jackson",years:"1958–2009"},
  {name:"Kobe Bryant",slug:"Kobe_Bryant",years:"1978–2020"},
  {name:"Chadwick Boseman",slug:"Chadwick_Boseman",years:"1976–2020"},
  {name:"Diego Maradona",slug:"Diego_Maradona",years:"1960–2020"},
  {name:"Paul Walker",slug:"Paul_Walker",years:"1973–2013"},
  {name:"Queen Elizabeth II",slug:"Elizabeth_II",years:"1926–2022"},
  {name:"Pelé",slug:"Pelé",years:"1940–2022"},
  {name:"Anthony Bourdain",slug:"Anthony_Bourdain",years:"1956–2018"},
  {name:"Notorious B.I.G.",slug:"The_Notorious_B.I.G.",years:"1972–1997"},
  {name:"Marlon Brando",slug:"Marlon_Brando",years:"1924–2004"},
  {name:"Frank Sinatra",slug:"Frank_Sinatra",years:"1915–1998"},
  {name:"Billie Holiday",slug:"Billie_Holiday",years:"1915–1959"},
  {name:"Miles Davis",slug:"Miles_Davis",years:"1926–1991"},
  {name:"Aretha Franklin",slug:"Aretha_Franklin",years:"1942–2018"},
  {name:"Johnny Cash",slug:"Johnny_Cash",years:"1932–2003"},
  {name:"Maya Angelou",slug:"Maya_Angelou",years:"1928–2014"},
  {name:"Martin Luther King Jr.",slug:"Martin_Luther_King_Jr.",years:"1929–1968"},
  {name:"John F. Kennedy",slug:"John_F._Kennedy",years:"1917–1963"},
  {name:"Albert Einstein",slug:"Albert_Einstein",years:"1879–1955"},
  {name:"Marie Curie",slug:"Marie_Curie",years:"1867–1934"},
  {name:"Nikola Tesla",slug:"Nikola_Tesla",years:"1856–1943"},
  {name:"Steve Jobs",slug:"Steve_Jobs",years:"1955–2011"},
  {name:"Pablo Picasso",slug:"Pablo_Picasso",years:"1881–1973"},
  {name:"Frida Kahlo",slug:"Frida_Kahlo",years:"1907–1954"},
  {name:"Coco Chanel",slug:"Coco_Chanel",years:"1883–1971"},
  {name:"Charlie Chaplin",slug:"Charlie_Chaplin",years:"1889–1977"},
  {name:"Ernest Hemingway",slug:"Ernest_Hemingway",years:"1899–1961"},
  {name:"Winston Churchill",slug:"Winston_Churchill",years:"1874–1965"},
];

// ═══════════════════════════════════════════
//  MOSAIC
// ═══════════════════════════════════════════
const isMobile=window.innerWidth<600;
const TW=isMobile?114:192, TH=isMobile?149:250, TG=isMobile?2:3, SX=TW+TG, SY=TH+TG;
const mc=document.getElementById('mosaicCanvas');
let camX=0,camY=0,velX=0,velY=0;
let mDrag=false,mDidDrag=false,mDX0,mDY0,mCX0,mCY0,mLX,mLY;
let edgePX=0,edgePY=0;
let mActive=true,mRaf;
let thumbs={},rendered=new Set();
let hoveredTile=null,clickedTile=null;

const rowPerms={};
function getRowPerm(r){
  if(rowPerms[r])return rowPerms[r];
  const n=STARS.length;
  let seed=(Math.abs(r)*1664525+1013904223)>>>0;
  const lcg=()=>{seed=(Math.imul(seed,1664525)+1013904223)>>>0;return seed/4294967296;};
  const p=[...Array(n).keys()];
  for(let i=n-1;i>0;i--){const j=Math.floor(lcg()*(i+1));[p[i],p[j]]=[p[j],p[i]];}
  rowPerms[r]=p;return p;
}
function starAt(c,r){
  const n=STARS.length,p=getRowPerm(r),col=((c%n)+n)%n;
  return STARS[p[col]];
}

function mInit(){
  renderTiles();mLoop();
  const ms=document.getElementById('mosaicScreen');
  ms.addEventListener('mousedown',e=>{
    mDrag=true;mDidDrag=false;
    mDX0=e.clientX;mDY0=e.clientY;mCX0=camX;mCY0=camY;
    mLX=e.clientX;mLY=e.clientY;velX=0;velY=0;
    mc.style.cursor='grabbing';e.preventDefault();
  },{passive:false});
  window.addEventListener('mousemove',e=>{
    if(mDrag){
      const dx=e.clientX-mDX0,dy=e.clientY-mDY0;
      if(Math.abs(dx)>4||Math.abs(dy)>4)mDidDrag=true;
      velX=e.clientX-mLX;velY=e.clientY-mLY;
      mLX=e.clientX;mLY=e.clientY;
      camX=mCX0+dx;camY=mCY0+dy;return;
    }
    const vw=window.innerWidth,vh=window.innerHeight;
    const x=e.clientX,y=e.clientY;
    const zx=vw*0.45,zy=vh*0.45,spd=12;
    edgePX=x<zx?spd*Math.pow((zx-x)/zx,2.5):x>vw-zx?-spd*Math.pow((x-(vw-zx))/zx,2.5):0;
    edgePY=y<zy?spd*Math.pow((zy-y)/zy,2.5):y>vh-zy?-spd*Math.pow((y-(vh-zy))/zy,2.5):0;
  });
  window.addEventListener('mouseup',()=>{mDrag=false;mc.style.cursor='';});
  ms.addEventListener('mouseleave',()=>{edgePX=0;edgePY=0;setHover(null);});
  let tX0,tY0,tCX0,tCY0,tLX,tLY,tMoved=false;
  ms.addEventListener('touchstart',e=>{
    const t=e.touches[0];mDrag=true;mDidDrag=false;tMoved=false;
    tX0=t.clientX;tY0=t.clientY;tCX0=camX;tCY0=camY;
    tLX=t.clientX;tLY=t.clientY;velX=0;velY=0;
  },{passive:true});
  ms.addEventListener('touchmove',e=>{
    if(!mDrag)return;
    const t=e.touches[0];
    const dx=t.clientX-tX0,dy=t.clientY-tY0;
    if(Math.abs(dx)>8||Math.abs(dy)>8){mDidDrag=true;tMoved=true;}
    velX=t.clientX-tLX;velY=t.clientY-tLY;
    tLX=t.clientX;tLY=t.clientY;
    camX=tCX0+dx;camY=tCY0+dy;
  },{passive:true});
  ms.addEventListener('touchend',e=>{
    mDrag=false;
    if(!tMoved&&e.changedTouches[0]){
      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const tile=el?.closest?.('.star-tile');
      if(tile?._star)enterStar(tile._star,tile);
    }
  });
}

function setHover(tile){
  if(hoveredTile===tile)return;
  hoveredTile=tile;
  const tiles=Array.from(mc.querySelectorAll('.star-tile'));
  if(!tile){tiles.forEach(t=>t.removeAttribute('data-b'));return;}
  const cx=parseInt(tile.style.left)+TW/2, cy=parseInt(tile.style.top)+TH/2;
  tiles.forEach(t=>{
    const tx=parseInt(t.style.left)+TW/2, ty=parseInt(t.style.top)+TH/2;
    const d=Math.max(Math.abs(tx-cx)/SX,Math.abs(ty-cy)/SY);
    t.setAttribute('data-b',String(d<0.5?4:d<1.5?3:d<2.5?2:d<3.5?1:0));
  });
}

function mLoop(){
  if(!mActive)return;
  if(!mDrag){
    velX*=0.97;velY*=0.97;
    camX+=velX;camY+=velY;
    if(edgePX||edgePY){camX+=edgePX;camY+=edgePY;}
  }
  mc.style.transform=`translate(${Math.round(camX)}px,${Math.round(camY)}px)`;
  renderTiles();
  mRaf=requestAnimationFrame(mLoop);
}

function renderTiles(){
  const vw=window.innerWidth,vh=window.innerHeight,buf=2;
  const c0=Math.floor((-camX-buf*SX)/SX),c1=Math.ceil((-camX+vw+buf*SX)/SX);
  const r0=Math.floor((-camY-buf*SY)/SY),r1=Math.ceil((-camY+vh+buf*SY)/SY);
  for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){
    const key=`${c},${r}`;
    if(rendered.has(key))continue;
    rendered.add(key);
    makeTile(starAt(c,r),c*SX,r*SY);
  }
}

function makeTile(star,tx,ty){
  const t=document.createElement('div');
  t.className='star-tile';t._star=star;
  t.style.cssText=`left:${tx}px;top:${ty}px;width:${TW}px;height:${TH}px;opacity:0;`;
  const ph=document.createElement('div');ph.className='star-ph';
  ph.innerHTML=`<div class="star-ph-i">${star.name[0]}</div>`;
  t.appendChild(ph);
  t.appendChild(Object.assign(document.createElement('div'),{className:'star-tile-shade'}));
  const lb=document.createElement('div');lb.className='star-tile-label';
  lb.innerHTML=`<div class="stn">${star.name}</div><div class="sty">${star.years}</div>`;
  t.appendChild(lb);
  t.addEventListener('mouseenter',()=>{if(!mDrag&&!mDidDrag)setHover(t);});
  t.addEventListener('mouseleave',()=>{if(hoveredTile===t)setHover(null);});
  t.addEventListener('click',()=>{if(!mDidDrag){setHover(null);enterStar(star,t);}});
  // New tiles during pan appear immediately (only first batch fades in)
  if(window._introsDone)t.style.opacity='1';
  mc.appendChild(t);
  if(thumbs[star.slug]){injectThumb(t,ph,thumbs[star.slug]);return;}
  fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(star.slug)}`)
    .then(r=>r.ok?r.json():null).then(d=>{
      if(!d?.thumbnail?.source)return;
      thumbs[star.slug]=d.thumbnail.source;
      mc.querySelectorAll('.star-tile').forEach(el=>{
        if(el._star?.slug===star.slug){const p=el.querySelector('.star-ph');if(p)injectThumb(el,p,d.thumbnail.source);}
      });
    }).catch(()=>{});
}

function injectThumb(tile,ph,src){
  if(!ph?.parentNode)return;
  const img=document.createElement('img');img.src=src;img.draggable=false;
  img.onload=()=>{if(ph?.parentNode)ph.replaceWith(img);};
}

// ═══════════════════════════════════════════
//  TRANSITION
// ═══════════════════════════════════════════
function enterStar(star,tile){
  mActive=false;cancelAnimationFrame(mRaf);
  edgePX=0;edgePY=0;clickedTile=tile;
  const thumb=thumbs[star.slug]||null;
  const rect=tile.getBoundingClientRect();
  const vw=window.innerWidth,vh=window.innerHeight;
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const maxR=Math.hypot(Math.max(cx,vw-cx),Math.max(cy,vh-cy));

  // Clone tile to centre
  const clone=document.createElement('div');
  clone.style.cssText=`position:fixed;z-index:80;overflow:hidden;border-radius:2px;pointer-events:none;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;transition:all .65s cubic-bezier(.4,0,.2,1);`;
  if(thumb){const ci=document.createElement('img');ci.src=thumb;ci.style.cssText='width:100%;height:100%;object-fit:cover;object-position:center top;display:block;';clone.appendChild(ci);}
  document.body.appendChild(clone);

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:70;background:var(--dark);opacity:0;transition:opacity .55s ease;pointer-events:none;';
  document.body.appendChild(overlay);

  const tW=Math.min(180,vw*0.25),tH=tW*(rect.height/rect.width);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    overlay.style.opacity='1';
    clone.style.left=((vw-tW)/2)+'px';
    clone.style.top=((vh-tH)/2-vh*0.08)+'px';
    clone.style.width=tW+'px';
    clone.style.height=tH+'px';
  }));

  setTimeout(()=>{
    document.getElementById('mosaicScreen').style.display='none';
    document.body.removeChild(overlay);
    startJourney(star,thumb,clone);
  },680);
}

// ═══════════════════════════════════════════
//  LOADING
// ═══════════════════════════════════════════
function showLoad(star,thumb,clone){
  document.getElementById('loadScreen').classList.add('on');
  const img=document.getElementById('lpImg');
  if(thumb){img.src=thumb;img.style.display='block';}else img.style.display='none';
  document.getElementById('lpName').textContent=star.name.toUpperCase();
  document.getElementById('lpDates').textContent=star.years||'';
  document.getElementById('lpErr').textContent='';
  setLoad(5,'GATHERING RECORDS');
  if(clone){
    setTimeout(()=>{
      if(!clone.parentNode)return;
      const r=img.getBoundingClientRect();
      clone.style.transition='all .4s ease,opacity .3s ease';
      clone.style.left=r.left+'px';clone.style.top=r.top+'px';
      clone.style.width=r.width+'px';clone.style.height=r.height+'px';
      clone.style.opacity='0';
      setTimeout(()=>{if(clone.parentNode)document.body.removeChild(clone);},450);
    },60);
  }
}
function setLoad(p,s){
  document.getElementById('lpFill').style.width=p+'%';
  if(s)document.getElementById('lpStep').textContent=s;
}
function hideLoad(){document.getElementById('loadScreen').classList.remove('on');}

// ═══════════════════════════════════════════
//  JOURNEY
// ═══════════════════════════════════════════
async function startJourney(star,thumb,clone){
  showLoad(star,thumb,clone);
  try{
    setLoad(20,'CURATING TIMELINE');
    const tl=await fetchTimeline(star.name);
    setLoad(55,'SOURCING PHOTOGRAPHS');
    const wiki=await fetchWikiImages(tl.wikipediaSlug||star.slug);
    setLoad(88,'BUILDING EXHIBITION');
    await sleep(200);setLoad(100,'');await sleep(150);
    hideLoad();
    buildTimeline(star,tl,wiki,thumb);
    document.getElementById('tlScreen').classList.add('on');
    const zd=document.getElementById('zoomDark');
    zd.style.opacity='0';setTimeout(()=>{zd.style.pointerEvents='none';},600);
  }catch(err){
    console.error(err);
    document.getElementById('lpErr').textContent=(err.message||'Could not load.')+'  Tap to return.';
    setLoad(0,'ERROR');
    document.getElementById('loadScreen').addEventListener('click',goHome,{once:true});
  }
}

function goHome(){
  stopTL();
  document.getElementById('tlScreen').classList.remove('on');
  document.getElementById('loadScreen').classList.remove('on');
  document.getElementById('mosaicScreen').style.display='block';
  if(clickedTile){const img=clickedTile.querySelector('img');if(img){img.style.filter='';img.style.opacity='';}clickedTile=null;}
  document.getElementById('zoomDark').style.opacity='0';
  setTimeout(()=>{document.getElementById('zoomDark').style.pointerEvents='none';},500);
  mActive=true;velX=0;velY=0;mLoop();
}
document.getElementById('tlBack').addEventListener('click',goHome);

// ═══════════════════════════════════════════
//  APIs
// ═══════════════════════════════════════════
async function fetchTimeline(name){
  const r=await fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`Error ${r.status}`);}
  const data=await r.json();
  if(data.error)throw new Error(data.error.message||data.error);
  const raw=data.content?.find(b=>b.type==='text')?.text||'{}';
  const clean=raw.replace(/^```json\s*|^```\s*|```\s*$/gm,'').trim();
  if(!clean||clean==='{}')throw new Error('No data returned');
  return JSON.parse(clean);
}

async function fetchWikiImages(slug){
  const s=slug.replace(/ /g,'_');
  const out={thumb:null,images:[]};
  try{const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(s)}`);if(r.ok){const d=await r.json();out.thumb=d.thumbnail?.source||null;}}catch(e){}
  try{
    const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(s)}&prop=images&imlimit=24&format=json&origin=*`);
    if(r.ok){
      const d=await r.json();
      const pg=Object.values(d.query?.pages||{})[0];
      const files=(pg?.images||[]).filter(i=>/\.(jpg|jpeg|png)$/i.test(i.title)).filter(i=>!/icon|logo|flag|map|signature|commons|arrow|button|blank|edit|grey|gray|lock|ribbon|seal|stub/i.test(i.title)).slice(0,16).map(i=>i.title.replace('File:',''));
      const urls=await Promise.all(files.map(resolveImg));
      out.images=urls.filter(Boolean);
    }
  }catch(e){}
  return out;
}
async function resolveImg(f){
  try{
    const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=File:${encodeURIComponent(f)}&prop=imageinfo&iiprop=url&format=json&origin=*`);
    const d=await r.json();
    const url=Object.values(d.query?.pages||{})[0]?.imageinfo?.[0]?.url||null;
    return(url&&/\.(jpg|jpeg|png)$/i.test(url))?url:null;
  }catch(e){return null;}
}

// ═══════════════════════════════════════════
//  TIMELINE — simple flexbox strip
// ═══════════════════════════════════════════
let tlScale=1,tlRunning=false,tlRaf;

function buildTimeline(star,tl,wiki,heroThumb){
  const allImgs=[heroThumb,wiki.thumb,...wiki.images].filter((v,i,a)=>v&&a.indexOf(v)===i);
  const fullName=tl.fullName||star.name;
  const diedPart=tl.died?` – ${tl.died}`:'';
  document.getElementById('tlName').textContent=fullName;
  document.getElementById('tlMeta').textContent=[tl.born?`${tl.born}${diedPart}`:'', (tl.fields||[]).join(' & '),tl.nationality].filter(Boolean).join(' · ');
  document.getElementById('tlTagline').textContent=tl.tagline||'';
  if(allImgs[0])document.getElementById('tlAmbient').style.backgroundImage=`url('${allImgs[0]}')`;

  const strip=document.getElementById('tlStrip');
  while(strip.children.length>1)strip.removeChild(strip.lastChild);

  const events=[...(tl.events||[])].sort((a,b)=>parseInt(a.year)-parseInt(b.year));
  const getY=s=>parseInt((s||'').toString().substring(0,4))||0;

  document.getElementById('scrubBirth').textContent=tl.born||'';
  document.getElementById('scrubDeath').textContent=tl.died||'';

  // Birth cap
  strip.appendChild(makeCap(tl.born||'','BIRTH'));

  events.forEach((ev,i)=>{
    const isUp=i%2===0;
    const isDeath=ev.type==='death'||i===events.length-1;
    const imgSrc=allImgs[i%Math.max(allImgs.length,1)];

    const col=document.createElement('div');
    col.className='ev-col'+(isUp?' up':'');

    const dot=document.createElement('div');
    dot.className='ev-dot'+(isDeath?' death':'');

    const conn=document.createElement('div');
    conn.className='ev-conn';

    const card=document.createElement('div');
    card.className='ev-card';

    if(imgSrc){
      const wrap=document.createElement('div');
      wrap.className='ev-play-wrap';
      const img=document.createElement('img');
      img.className='ev-img';img.src=imgSrc;img.alt=ev.title||'';img.loading='lazy';
      img.onerror=()=>wrap.remove();
      wrap.appendChild(img);
      if(isDeath){
        const pb=document.createElement('div');pb.className='ev-play-btn';
        pb.innerHTML=`<svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="39" stroke="rgba(201,168,76,0.85)" stroke-width="1.5"/><path d="M32 26l24 14-24 14V26z" fill="rgba(201,168,76,0.95)"/></svg>`;
        wrap.appendChild(pb);
        const q=(tl.youtubeSearchTerms||[star.name+' documentary'])[0];
        card.addEventListener('click',()=>openVideo(q,ev.title));
      }
      card.appendChild(wrap);
    }

    const body=document.createElement('div');body.className='ev-body';
    body.innerHTML=`
      <div class="ev-yr">${ev.year||''}</div>
      <div class="ev-type">${(ev.type||'').toUpperCase()}</div>
      <div class="ev-title">${ev.title||''}</div>
      <div class="ev-text">${ev.text||''}</div>
      ${ev.quote?`<div class="ev-quote">"${ev.quote.replace(/^["\u201C]|["\u201D"]$/g,'')}"</div>`:''}
    `;
    card.appendChild(body);

    col.appendChild(card);
    col.appendChild(conn);
    col.appendChild(dot);
    strip.appendChild(col);
  });

  if(tl.died)strip.appendChild(makeCap(tl.died,'DEATH'));

  // Scroll to start
  const sc=document.getElementById('tlScroll');
  sc.scrollLeft=0;

  // Setup interactions
  setupScrollDrag(sc);
  setupZoom();
  setupTLEdgePan(sc);
  sc.addEventListener('scroll',updateScrubber,{passive:true});
  tlRunning=true;
}

function makeCap(yr,lbl){
  const w=document.createElement('div');w.className='tl-cap';
  w.innerHTML=`<div class="tl-cap-yr">${yr}</div><div class="tl-cap-dot"></div><div class="tl-cap-lbl">${lbl}</div>`;
  return w;
}

function updateScrubber(){
  const sc=document.getElementById('tlScroll');
  const max=sc.scrollWidth-sc.clientWidth;
  if(max<=0)return;
  const p=sc.scrollLeft/max;
  document.getElementById('scrubFill').style.width=(p*100)+'%';
  document.getElementById('scrubThumb').style.left=(p*100)+'%';
}

function setupScrollDrag(sc){
  let drag=false,sx0,sl0,lx,vel=0;
  sc.addEventListener('mousedown',e=>{drag=true;sx0=e.clientX;sl0=sc.scrollLeft;lx=e.clientX;vel=0;sc.classList.add('grabbing');e.preventDefault();},{passive:false});
  window.addEventListener('mousemove',e=>{if(!drag)return;vel=e.clientX-lx;lx=e.clientX;sc.scrollLeft=sl0-(e.clientX-sx0);});
  window.addEventListener('mouseup',()=>{
    if(!drag)return;drag=false;sc.classList.remove('grabbing');
    let v=-vel;function coast(){if(Math.abs(v)<0.5)return;sc.scrollLeft+=v;v*=0.93;requestAnimationFrame(coast);}coast();
  });
  document.getElementById('scrubTrack').addEventListener('click',e=>{
    const rect=e.currentTarget.getBoundingClientRect();
    sc.scrollLeft=(e.clientX-rect.left)/rect.width*(sc.scrollWidth-sc.clientWidth);
  });
}

function setupTLEdgePan(sc){
  // Pan timeline when cursor in outer 25% of screen
  let tlEdgeRaf,tlEdgeVel=0;
  document.getElementById('tlScreen').addEventListener('mousemove',e=>{
    const vw=window.innerWidth;
    const zone=vw*0.25,spd=8;
    const x=e.clientX;
    tlEdgeVel=x<zone?-spd*Math.pow((zone-x)/zone,2):x>vw-zone?spd*Math.pow((x-(vw-zone))/zone,2):0;
  });
  document.getElementById('tlScreen').addEventListener('mouseleave',()=>{tlEdgeVel=0;});
  function edgePanLoop(){
    if(tlEdgeVel&&!document.getElementById('tlScroll').classList.contains('grabbing')){
      sc.scrollLeft+=tlEdgeVel;
      updateScrubber();
    }
    tlEdgeRaf=requestAnimationFrame(edgePanLoop);
  }
  tlEdgeRaf=requestAnimationFrame(edgePanLoop);
  // Store ref to cancel on goHome
  sc._edgeRaf=tlEdgeRaf;
}

function setupZoom(){
  const strip=document.getElementById('tlStrip');
  const sc=document.getElementById('tlScroll');
  function apply(s){
    tlScale=Math.min(2.5,Math.max(0.4,s));
    strip.querySelectorAll('.ev-col').forEach(c=>{c.style.width=Math.round(230*tlScale)+'px';c.style.margin=`0 ${Math.round(14*tlScale)}px`;});
    strip.querySelectorAll('.ev-conn').forEach(c=>c.style.height=Math.round(48*tlScale)+'px');
    strip.querySelectorAll('.ev-img').forEach(img=>img.style.height=Math.round(120*tlScale)+'px');
    // Scale text with zoom
    const fs=Math.max(0.65,Math.min(1.2,tlScale));
    strip.querySelectorAll('.ev-title').forEach(el=>el.style.fontSize=Math.round(fs*15.2)/16+'rem');
    strip.querySelectorAll('.ev-text').forEach(el=>el.style.fontSize=Math.round(fs*12.5)/16+'rem');
    strip.querySelectorAll('.ev-yr').forEach(el=>el.style.fontSize=Math.round(fs*8)+'px');
  }
  document.getElementById('zIn').onclick=()=>apply(tlScale*1.3);
  document.getElementById('zOut').onclick=()=>apply(tlScale/1.3);
  document.getElementById('zFit').onclick=()=>{apply(1);sc.scrollLeft=0;};
  sc.addEventListener('wheel',e=>{if(e.ctrlKey||e.metaKey){e.preventDefault();apply(e.deltaY>0?tlScale*0.9:tlScale*1.1);}},{passive:false});
}

function stopTL(){
  tlRunning=false;cancelAnimationFrame(tlRaf);
  const strip=document.getElementById('tlStrip');
  if(strip)while(strip.children.length>1)strip.removeChild(strip.lastChild);
}

// ═══════════════════════════════════════════
//  VIDEO
// ═══════════════════════════════════════════
function openVideo(query,title){
  // Search YouTube for documentary — use results page embedded
  // Try multiple approaches: first a curated search embed
  const q=encodeURIComponent(query+' full documentary');
  document.getElementById('videoFrame').src=`https://www.youtube.com/embed?listType=search&list=${q}&index=1&rel=0&modestbranding=1`;
  document.getElementById('videoOverlay').classList.add('on');
}
document.getElementById('videoClose').addEventListener('click',()=>{
  document.getElementById('videoOverlay').classList.remove('on');
  document.getElementById('videoFrame').src='';
});

// ═══════════════════════════════════════════
//  FULLSCREEN + UTILS
// ═══════════════════════════════════════════
document.getElementById('fsBtn').addEventListener('click',()=>{
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
window.addEventListener('resize',()=>{
  const sc=document.getElementById('tlScroll');if(sc)updateScrubber();
});

// Intro sequence then staggered tile reveal
setTimeout(()=>{
  document.getElementById('intro').classList.add('done');
  window._introsDone=false;
  mInit();
  setTimeout(()=>{window._introsDone=true;},3500);
  // Stagger brightness reveal — tiles flicker in
  setTimeout(()=>{
    const tiles=Array.from(mc.querySelectorAll('.star-tile'));
    tiles.forEach((t,i)=>{
      setTimeout(()=>{
        t.style.transition='opacity .4s ease';
        t.style.opacity='1';
      }, Math.random()*800);
    });
  },100);
}, 3200);

// Mobile: track which tile is in centre and show its label
if(isMobile){
  const ms=document.getElementById('mosaicScreen');
  function updateMobileCentre(){
    const cx=window.innerWidth/2-camX;
    const cy=window.innerHeight/2-camY;
    const col=Math.round((cx-TW/2)/SX);
    const row=Math.round((cy-TH/2)/SY);
    mc.querySelectorAll('.mobile-centre').forEach(t=>t.classList.remove('mobile-centre'));
    const key=`${col},${row}`;
    const tile=Array.from(mc.querySelectorAll('.star-tile')).find(t=>{
      const tl=parseInt(t.style.left),tt=parseInt(t.style.top);
      return Math.abs(tl-col*SX)<SX/2&&Math.abs(tt-row*SY)<SY/2;
    });
    if(tile)tile.classList.add('mobile-centre');
  }
  setInterval(updateMobileCentre,200);
}
