<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starseum</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Mono:ital,wght@0,300;0,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:rgba(201,168,76,0.22);--gold3:rgba(201,168,76,0.07);
  --cream:#F0E6CC;--dark:#0C0A07;--card:#181410;--card2:#201C14;
  --txt:#DDD5BE;--muted:#6A6050;--muted2:#4A4438;
  --serif:'Cormorant Garamond',Georgia,serif;
  --display:'Cinzel',serif;--mono:'DM Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--txt);-webkit-font-smoothing:antialiased;}

/* ══════════ MOSAIC ══════════ */
#mosaicScreen{position:fixed;inset:0;overflow:hidden;z-index:1;}
#mosaicCanvas{position:absolute;will-change:transform;cursor:grab;}
#mosaicCanvas.dragging{cursor:grabbing;}

.star-tile{
  position:absolute;overflow:hidden;cursor:pointer;
  background:#111;border:1px solid rgba(255,255,255,0.03);
  transition:border-color .3s;
}
.star-tile:hover{border-color:rgba(201,168,76,0.3);}
.star-tile img{
  width:100%;height:100%;object-fit:cover;object-position:center top;
  filter:grayscale(35%) brightness(0.72) contrast(1.12);
  transition:filter .5s,transform .55s cubic-bezier(.25,.46,.45,.94);
  display:block;pointer-events:none;
}
.star-tile:hover img{filter:grayscale(0%) brightness(.9) contrast(1.08);transform:scale(1.07);}
.star-tile-vig{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 55%,transparent 100%);opacity:0;transition:opacity .3s;}
.star-tile:hover .star-tile-vig{opacity:1;}
.star-tile-info{position:absolute;bottom:0;left:0;right:0;padding:.55rem .7rem;opacity:0;transform:translateY(5px);transition:opacity .3s,transform .3s;}
.star-tile:hover .star-tile-info{opacity:1;transform:none;}
.star-tile-name{font-family:var(--display);font-size:10px;letter-spacing:.1em;color:var(--cream);line-height:1.25;}
.star-tile-years{font-family:var(--mono);font-size:8px;color:var(--gold);margin-top:2px;}
.star-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--card);}
.star-ph-init{font-family:var(--display);font-size:2.5rem;color:rgba(201,168,76,0.2);}

.mosaic-hud{
  position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;
  padding:1.2rem 1.8rem;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(12,10,7,.9) 0%,transparent 100%);
}
.mosaic-logo{font-family:var(--display);font-size:1rem;letter-spacing:.3em;color:var(--cream);font-weight:600;}
.mosaic-logo em{color:var(--gold);font-style:normal;font-size:.6em;vertical-align:super;}
.mosaic-hint{font-family:var(--mono);font-size:8px;letter-spacing:.15em;color:var(--muted);}

/* ══════════ ZOOM / TRANSITION ══════════ */
#zoomDark{position:fixed;inset:0;z-index:100;background:var(--dark);opacity:0;pointer-events:none;transition:opacity .55s ease;}

/* ══════════ LOAD SCREEN ══════════ */
#loadScreen{
  position:fixed;inset:0;z-index:200;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:var(--dark);
}
#loadScreen.on{display:flex;}
.lp-img{width:110px;height:140px;object-fit:cover;object-position:center top;border:1px solid var(--gold2);margin-bottom:1.8rem;filter:grayscale(20%) sepia(.1);}
.lp-name{font-family:var(--display);font-size:clamp(1.6rem,4vw,2.6rem);color:var(--cream);letter-spacing:.14em;margin-bottom:.25rem;}
.lp-dates{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.18em;margin-bottom:2rem;}
.lp-track{width:220px;height:1px;background:rgba(201,168,76,.1);margin-bottom:1rem;overflow:hidden;}
.lp-fill{height:100%;background:var(--gold);width:0%;transition:width .55s ease;}
.lp-step{font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--muted);}
.lp-err{color:#c07050;font-size:13px;margin-top:1.5rem;font-family:var(--serif);font-style:italic;text-align:center;max-width:340px;}

/* ══════════ TIMELINE SCREEN ══════════ */
#tlScreen{
  position:fixed;inset:0;z-index:200;display:none;
  flex-direction:column;background:var(--dark);
}
#tlScreen.on{display:flex;}

.tl-bar{
  display:flex;align-items:center;gap:1.2rem;flex-shrink:0;
  padding:.8rem 1.5rem;border-bottom:1px solid var(--gold2);
  background:rgba(12,10,7,.97);backdrop-filter:blur(12px);z-index:10;
}
.tl-back{background:none;border:none;cursor:pointer;font-family:var(--display);font-size:8px;letter-spacing:2.5px;color:var(--muted);padding:0;transition:color .2s;display:flex;align-items:center;gap:5px;}
.tl-back:hover{color:var(--gold);}
.tl-star-wrap{flex:1;min-width:0;}
.tl-star-name{font-family:var(--display);font-size:clamp(.9rem,2.5vw,1.3rem);font-weight:600;color:var(--cream);letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-star-meta{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:1px;letter-spacing:.08em;}
.tl-zoom-btns{display:flex;gap:4px;flex-shrink:0;}
.tl-zoom-btn{background:var(--card);border:1px solid var(--gold2);color:var(--gold);font-family:var(--mono);font-size:12px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;border-radius:1px;}
.tl-zoom-btn:hover{background:var(--card2);}

/* Timeline viewport */
.tl-viewport{flex:1;overflow:hidden;position:relative;}

/* Scrollable inner — panned by JS */
.tl-stage{
  position:absolute;
  top:0;left:0;
  height:100%;
  will-change:transform;
  display:flex;align-items:center;
  transform-origin:left center;
}

/* Spine */
.tl-spine-wrap{
  position:absolute;top:50%;left:0;right:0;
  transform:translateY(-50%);
  height:1px;background:linear-gradient(90deg,transparent,var(--gold2) 3%,var(--gold2) 97%,transparent);
  pointer-events:none;z-index:0;
}

/* Year ruler ticks */
.tl-tick{
  position:absolute;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;z-index:1;
}
.tl-tick-line{width:1px;background:var(--gold2);opacity:.5;}
.tl-tick-year{font-family:var(--mono);font-size:8px;color:var(--muted2);letter-spacing:.05em;margin-top:3px;white-space:nowrap;}

/* Events */
.tl-event{
  position:absolute;
  width:240px;
  z-index:5;
  cursor:pointer;
}
.tl-event.up{bottom:calc(50% + 18px);}
.tl-event.down{top:calc(50% + 18px);}

.tl-ev-card{
  background:var(--card);border:1px solid var(--gold2);
  border-radius:2px;overflow:hidden;
  transition:border-color .2s,transform .2s;
  transform-origin:bottom center;
}
.tl-event.down .tl-ev-card{transform-origin:top center;}
.tl-event:hover .tl-ev-card{border-color:rgba(201,168,76,.5);transform:scale(1.03);}

.tl-ev-img{width:100%;height:130px;object-fit:cover;object-position:center top;display:block;filter:sepia(.08) contrast(1.05);}
.tl-ev-body{padding:.7rem .8rem;}
.tl-ev-year{font-family:var(--mono);font-size:8px;color:var(--gold);letter-spacing:.15em;margin-bottom:.2rem;}
.tl-ev-type{font-family:var(--display);font-size:7px;letter-spacing:.25em;color:var(--muted);opacity:.7;margin-bottom:.25rem;}
.tl-ev-title{font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--cream);line-height:1.2;margin-bottom:.35rem;}
.tl-ev-text{font-family:var(--serif);font-size:.82rem;line-height:1.65;color:var(--txt);}
.tl-ev-quote{margin-top:.55rem;padding:.5rem .65rem;border-left:2px solid var(--gold);background:rgba(201,168,76,.04);font-family:var(--serif);font-style:italic;font-size:.8rem;color:var(--cream);line-height:1.5;}

/* Connector lines */
.tl-ev-connector{
  position:absolute;left:50%;bottom:0;
  width:1px;background:var(--gold2);
  transform:translateX(-50%);
  pointer-events:none;
}
.tl-event.down .tl-ev-connector{bottom:auto;top:0;}
.tl-ev-dot{
  position:absolute;left:50%;
  width:8px;height:8px;border-radius:50%;
  border:1px solid var(--gold);background:var(--dark);
  transform:translateX(-50%);z-index:6;
}
.tl-event.up .tl-ev-dot{bottom:-4px;}
.tl-event.down .tl-ev-dot{top:-4px;}

/* Caps */
.tl-cap{
  position:absolute;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;z-index:6;
}
.tl-cap-dot{width:14px;height:14px;border-radius:50%;background:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.6);}
.tl-cap-year{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.1em;}
.tl-cap-label{font-family:var(--display);font-size:7px;letter-spacing:.25em;color:var(--muted);}

/* Video overlay */
.tl-ev-yt{width:100%;aspect-ratio:16/9;border:none;display:block;}
.tl-ev-yt-btn{
  width:100%;padding:.5rem;background:rgba(201,168,76,.08);
  border:none;border-top:1px solid var(--gold2);
  color:var(--gold);font-family:var(--mono);font-size:8px;
  letter-spacing:.15em;cursor:pointer;transition:background .2s;
}
.tl-ev-yt-btn:hover{background:rgba(201,168,76,.15);}

/* Bottom scrubber */
.tl-scrub{
  display:flex;align-items:center;gap:0;
  border-top:1px solid var(--gold2);flex-shrink:0;
  background:rgba(12,10,7,.95);overflow-x:auto;scrollbar-width:none;
  padding:0 1rem;
}
.tl-scrub::-webkit-scrollbar{display:none;}
.tl-scrub-item{
  font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;color:var(--muted);
  cursor:pointer;white-space:nowrap;padding:.55rem .7rem;
  border-top:2px solid transparent;transition:all .2s;flex-shrink:0;
}
.tl-scrub-item:hover,.tl-scrub-item.active{color:var(--gold);border-top-color:var(--gold);}
.tl-scrub-sep{width:16px;height:1px;background:var(--gold2);flex-shrink:0;}
</style>
</head>
<body>

<div id="mosaicScreen">
  <div id="mosaicCanvas"></div>
  <div class="mosaic-hud">
    <div class="mosaic-logo">STARSEUM<em>AI</em></div>
    <div class="mosaic-hint">DRAG TO EXPLORE · CLICK TO ENTER</div>
  </div>
</div>

<div id="zoomDark"></div>

<div id="loadScreen">
  <img class="lp-img" id="lpImg" src="" alt="">
  <div class="lp-name" id="lpName"></div>
  <div class="lp-dates" id="lpDates"></div>
  <div class="lp-track"><div class="lp-fill" id="lpFill"></div></div>
  <div class="lp-step" id="lpStep">GATHERING RECORDS</div>
  <div class="lp-err" id="lpErr"></div>
</div>

<div id="tlScreen">
  <div class="tl-bar">
    <button class="tl-back" id="tlBack">← MUSEUM</button>
    <div class="tl-star-wrap">
      <div class="tl-star-name" id="tlName"></div>
      <div class="tl-star-meta" id="tlMeta"></div>
    </div>
    <div class="tl-zoom-btns">
      <button class="tl-zoom-btn" id="zoomIn" title="Zoom in">+</button>
      <button class="tl-zoom-btn" id="zoomOut" title="Zoom out">−</button>
      <button class="tl-zoom-btn" id="zoomReset" title="Reset" style="font-size:9px;width:auto;padding:0 8px;letter-spacing:.1em">FIT</button>
    </div>
  </div>
  <div class="tl-viewport" id="tlViewport">
    <div class="tl-stage" id="tlStage">
      <div class="tl-spine-wrap"></div>
    </div>
  </div>
  <div class="tl-scrub" id="tlScrub"></div>
</div>

<script>
// ══════════ STARS DATA ══════════
const STARS = [
  {name:"Queen Elizabeth II",slug:"Elizabeth_II",years:"1926–2022"},
  {name:"Elvis Presley",slug:"Elvis_Presley",years:"1935–1977"},
  {name:"Paul Walker",slug:"Paul_Walker",years:"1973–2013"},
  {name:"Kobe Bryant",slug:"Kobe_Bryant",years:"1978–2020"},
  {name:"River Phoenix",slug:"River_Phoenix",years:"1970–1993"},
  {name:"Diego Maradona",slug:"Diego_Maradona",years:"1960–2020"},
  {name:"Sinéad O'Connor",slug:"Sin%C3%A9ad_O%27Connor",years:"1966–2023"},
  {name:"Robin Williams",slug:"Robin_Williams",years:"1951–2014"},
  {name:"Tupac Shakur",slug:"Tupac_Shakur",years:"1971–1996"},
  {name:"Whitney Houston",slug:"Whitney_Houston",years:"1963–2012"},
  {name:"Bob Marley",slug:"Bob_Marley",years:"1945–1981"},
  {name:"Bruce Lee",slug:"Bruce_Lee",years:"1940–1973"},
  {name:"Chadwick Boseman",slug:"Chadwick_Boseman",years:"1976–2020"},
  {name:"John Lennon",slug:"John_Lennon",years:"1940–1980"},
  {name:"Heath Ledger",slug:"Heath_Ledger",years:"1979–2008"},
  {name:"Prince",slug:"Prince_(musician)",years:"1958–2016"},
  {name:"James Dean",slug:"James_Dean",years:"1931–1955"},
  {name:"Amy Winehouse",slug:"Amy_Winehouse",years:"1983–2011"},
  {name:"Audrey Hepburn",slug:"Audrey_Hepburn",years:"1929–1993"},
  {name:"Kurt Cobain",slug:"Kurt_Cobain",years:"1967–1994"},
  {name:"Princess Diana",slug:"Diana,_Princess_of_Wales",years:"1961–1997"},
  {name:"Pelé",slug:"Pel%C3%A9",years:"1940–2022"},
  {name:"Freddie Mercury",slug:"Freddie_Mercury",years:"1946–1991"},
  {name:"Marilyn Monroe",slug:"Marilyn_Monroe",years:"1926–1962"},
  {name:"David Bowie",slug:"David_Bowie",years:"1947–2016"},
  {name:"Muhammad Ali",slug:"Muhammad_Ali",years:"1942–2016"},
  {name:"Maya Angelou",slug:"Maya_Angelou",years:"1928–2014"},
  {name:"Frida Kahlo",slug:"Frida_Kahlo",years:"1907–1954"},
  {name:"Pablo Picasso",slug:"Pablo_Picasso",years:"1881–1973"},
  {name:"Nikola Tesla",slug:"Nikola_Tesla",years:"1856–1943"},
  {name:"Johnny Cash",slug:"Johnny_Cash",years:"1932–2003"},
  {name:"Anthony Bourdain",slug:"Anthony_Bourdain",years:"1956–2018"},
  {name:"Notorious B.I.G.",slug:"The_Notorious_B.I.G.",years:"1972–1997"},
  {name:"Philip S. Hoffman",slug:"Philip_Seymour_Hoffman",years:"1967–2014"},
  {name:"Bill Withers",slug:"Bill_Withers",years:"1938–2020"},
  {name:"Marlon Brando",slug:"Marlon_Brando",years:"1924–2004"},
  {name:"Michael Jackson",slug:"Michael_Jackson",years:"1958–2009"},
  {name:"Jimi Hendrix",slug:"Jimi_Hendrix",years:"1942–1970"},
  {name:"Aretha Franklin",slug:"Aretha_Franklin",years:"1942–2018"},
  {name:"Steve Jobs",slug:"Steve_Jobs",years:"1955–2011"},
  {name:"Leonardo da Vinci",slug:"Leonardo_da_Vinci",years:"1452–1519"},
  {name:"Napoleon Bonaparte",slug:"Napoleon",years:"1769–1821"},
  {name:"Marie Curie",slug:"Marie_Curie",years:"1867–1934"},
  {name:"Winston Churchill",slug:"Winston_Churchill",years:"1874–1965"},
  {name:"Martin Luther King Jr.",slug:"Martin_Luther_King_Jr.",years:"1929–1968"},
  {name:"Che Guevara",slug:"Che_Guevara",years:"1928–1967"},
  {name:"Malcolm X",slug:"Malcolm_X",years:"1925–1965"},
  {name:"Janis Joplin",slug:"Janis_Joplin",years:"1943–1970"},
  {name:"Jim Morrison",slug:"Jim_Morrison",years:"1943–1971"},
  {name:"Frank Sinatra",slug:"Frank_Sinatra",years:"1915–1998"},
  {name:"Billie Holiday",slug:"Billie_Holiday",years:"1915–1959"},
  {name:"Miles Davis",slug:"Miles_Davis",years:"1926–1991"},
  {name:"John F. Kennedy",slug:"John_F._Kennedy",years:"1917–1963"},
  {name:"Albert Einstein",slug:"Albert_Einstein",years:"1879–1955"},
  {name:"Charlie Chaplin",slug:"Charlie_Chaplin",years:"1889–1977"},
  {name:"Humphrey Bogart",slug:"Humphrey_Bogart",years:"1899–1957"},
  {name:"Coco Chanel",slug:"Coco_Chanel",years:"1883–1971"},
  {name:"Salvador Dali",slug:"Salvador_Dalí",years:"1904–1989"},
  {name:"Ernest Hemingway",slug:"Ernest_Hemingway",years:"1899–1961"},
  {name:"Bob Dylan",slug:"Bob_Dylan",years:"1941–"},
];

// ══════════ INFINITE MOSAIC ══════════
const TILE_W = 200, TILE_H = 260, GAP = 3;
const COLS = 8; // tiles per row in virtual grid
const STEP_X = TILE_W + GAP, STEP_Y = TILE_H + GAP;

const canvas = document.getElementById('mosaicCanvas');
let camX = 0, camY = 0;
let velX = 0, velY = 0;
let isDragging = false, hasDragged = false;
let dragX0, dragY0, camX0, camY0, lastDragX, lastDragY;
let thumbCache = {};
const renderedKeys = new Set(); // "col,row" keys already created
let autoPanX = 0, autoPanY = 0; // edge-proximity autopan
let mosaicActive = true;
let rafId;

// Infinite grid: map any (col,row) → a star deterministically
function starAt(col, row) {
  // Use a large prime shuffle so adjacent tiles feel varied
  const idx = Math.abs((col * 2971 + row * 1049 + col * row * 31) % STARS.length);
  return STARS[idx];
}

function initMosaic() {
  // Start camera so grid is centred
  camX = 0; camY = 0;
  renderVisibleTiles();
  startLoop();

  const ms = document.getElementById('mosaicScreen');

  // ── Mouse drag ──
  ms.addEventListener('mousedown', e => {
    isDragging = true; hasDragged = false;
    dragX0 = e.clientX; dragY0 = e.clientY;
    camX0 = camX; camY0 = camY;
    lastDragX = e.clientX; lastDragY = e.clientY;
    velX = 0; velY = 0;
    canvas.classList.add('dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - dragX0, dy = e.clientY - dragY0;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) hasDragged = true;
    velX = e.clientX - lastDragX; velY = e.clientY - lastDragY;
    lastDragX = e.clientX; lastDragY = e.clientY;
    camX = camX0 + dx; camY = camY0 + dy;
  });
  window.addEventListener('mouseup', () => { isDragging = false; canvas.classList.remove('dragging'); });

  // ── Mouse proximity edge-pan (desktop) ──
  ms.addEventListener('mousemove', e => {
    if (isDragging) return;
    const vw = window.innerWidth, vh = window.innerHeight;
    const zone = 100, maxSpd = 5;
    const lx = e.clientX, ly = e.clientY;
    autoPanX = lx < zone ? -maxSpd * (1 - lx / zone)
             : lx > vw - zone ? maxSpd * (1 - (vw - lx) / zone) : 0;
    autoPanY = ly < zone ? -maxSpd * (1 - ly / vh * zone / zone)
             : ly > vh - zone ? maxSpd * (1 - (vh - ly) / zone) : 0;
    // fine-tune: use actual distance
    autoPanX = lx < zone ? -maxSpd * Math.pow(1 - lx / zone, 1.5)
             : lx > vw - zone ? maxSpd * Math.pow(1 - (vw - lx) / zone, 1.5) : 0;
    autoPanY = ly < zone ? -maxSpd * Math.pow(1 - ly / zone, 1.5)
             : ly > vh - zone ? maxSpd * Math.pow(1 - (vh - ly) / zone, 1.5) : 0;
  });
  ms.addEventListener('mouseleave', () => { autoPanX = 0; autoPanY = 0; });

  // ── Touch (mobile) ──
  let touchStartX, touchStartY, touchStartCamX, touchStartCamY, touchLastX, touchLastY, touchMoved;
  ms.addEventListener('touchstart', e => {
    const t = e.touches[0];
    isDragging = true; hasDragged = false; touchMoved = false;
    touchStartX = t.clientX; touchStartY = t.clientY;
    touchStartCamX = camX; touchStartCamY = camY;
    touchLastX = t.clientX; touchLastY = t.clientY;
    velX = 0; velY = 0;
  }, {passive:true});

  ms.addEventListener('touchmove', e => {
    if (!isDragging || !e.touches[0]) return;
    const t = e.touches[0];
    const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
    if (Math.abs(dx) > 6 || Math.abs(dy) > 6) { hasDragged = true; touchMoved = true; }
    velX = t.clientX - touchLastX; velY = t.clientY - touchLastY;
    touchLastX = t.clientX; touchLastY = t.clientY;
    camX = touchStartCamX + dx; camY = touchStartCamY + dy;
  }, {passive:true});

  ms.addEventListener('touchend', e => {
    isDragging = false;
    // Tap = no movement = select
    if (!touchMoved && e.changedTouches[0]) {
      const t = e.changedTouches[0];
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const tile = el?.closest('.star-tile');
      if (tile?._star) enterStar(tile._star, tile);
    }
  });
}

function startLoop() {
  function loop() {
    if (!mosaicActive) return;
    if (!isDragging) {
      // momentum
      if (Math.abs(velX) > 0.1 || Math.abs(velY) > 0.1) {
        camX += velX; camY += velY;
        velX *= 0.92; velY *= 0.92;
      }
      // edge autopan
      if (autoPanX || autoPanY) {
        camX += autoPanX; camY += autoPanY;
        velX = 0; velY = 0;
      }
    }
    canvas.style.transform = `translate(${camX}px,${camY}px)`;
    renderVisibleTiles();
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

function renderVisibleTiles() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const buf = 1.5; // buffer in tile units

  // Figure out which grid cols/rows are visible
  const colMin = Math.floor((-camX - buf * STEP_X) / STEP_X);
  const colMax = Math.ceil((-camX + vw + buf * STEP_X) / STEP_X);
  const rowMin = Math.floor((-camY - buf * STEP_Y) / STEP_Y);
  const rowMax = Math.ceil((-camY + vh + buf * STEP_Y) / STEP_Y);

  for (let row = rowMin; row <= rowMax; row++) {
    for (let col = colMin; col <= colMax; col++) {
      const key = `${col},${row}`;
      if (renderedKeys.has(key)) continue;
      renderedKeys.add(key);
      const star = starAt(col, row);
      const tx = col * STEP_X, ty = row * STEP_Y;
      createTile(star, key, tx, ty);
    }
  }
}

function createTile(star, key, tx, ty) {
  const tile = document.createElement('div');
  tile.className = 'star-tile';
  tile.style.cssText = `left:${tx}px;top:${ty}px;width:${TILE_W}px;height:${TILE_H}px;`;
  tile._star = star;

  const ph = document.createElement('div'); ph.className = 'star-ph';
  ph.innerHTML = `<div class="star-ph-init">${star.name[0]}</div>`;
  tile.appendChild(ph);

  const vig = document.createElement('div'); vig.className = 'star-tile-vig'; tile.appendChild(vig);
  const info = document.createElement('div'); info.className = 'star-tile-info';
  info.innerHTML = `<div class="star-tile-name">${star.name}</div><div class="star-tile-years">${star.years}</div>`;
  tile.appendChild(info);

  // Desktop click
  tile.addEventListener('click', () => { if (!hasDragged) enterStar(star, tile); });
  canvas.appendChild(tile);

  // Load thumb
  if (thumbCache[star.slug]) { injectImg(tile, ph, thumbCache[star.slug]); return; }
  fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(star.slug)}`)
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (d?.thumbnail?.source) {
        thumbCache[star.slug] = d.thumbnail.source;
        // inject into ALL tiles for this star
        document.querySelectorAll('.star-tile').forEach(t => {
          if (t._star?.slug === star.slug) {
            const p = t.querySelector('.star-ph');
            if (p) injectImg(t, p, d.thumbnail.source);
          }
        });
      }
    }).catch(() => {});
}

function injectImg(tile, ph, src) {
  if (!ph || !ph.parentNode) return;
  const img = document.createElement('img');
  img.src = src;
  img.onload = () => { if (ph.parentNode) ph.replaceWith(img); };
}

// ══════════ ENTER STAR ══════════
function enterStar(star, tile) {
  mosaicActive = false;
  cancelAnimationFrame(rafId);
  autoPanX = 0; autoPanY = 0;
  const zd = document.getElementById('zoomDark');
  zd.style.pointerEvents = 'all';
  zd.style.opacity = '1';
  setTimeout(() => {
    document.getElementById('mosaicScreen').style.display = 'none';
    startJourney(star, thumbCache[star.slug] || null);
  }, 500);
}

// ══════════ LOADING ══════════
function showLoad(star, thumb) {
  const ls = document.getElementById('loadScreen');
  ls.classList.add('on');
  const img = document.getElementById('lpImg');
  if (thumb) { img.src = thumb; img.style.display = 'block'; } else { img.style.display = 'none'; }
  document.getElementById('lpName').textContent = star.name.toUpperCase();
  document.getElementById('lpDates').textContent = star.years || '';
  document.getElementById('lpErr').textContent = '';
  setLoad(5, 'GATHERING RECORDS');
}
function setLoad(pct, step) {
  document.getElementById('lpFill').style.width = pct + '%';
  if (step) document.getElementById('lpStep').textContent = step;
}
function hideLoad() { document.getElementById('loadScreen').classList.remove('on'); }

// ══════════ JOURNEY ══════════
async function startJourney(star, thumb) {
  showLoad(star, thumb);
  try {
    setLoad(18, 'CURATING TIMELINE');
    const tl = await fetchTimeline(star.name);

    setLoad(52, 'SOURCING PHOTOGRAPHS');
    const wiki = await fetchWikiImages(tl.wikipediaSlug || star.slug);

    setLoad(80, 'FINDING VIDEO');
    const ytIds = await findYouTubeIds(tl.youtubeSearchTerms || [star.name + ' documentary']);

    setLoad(96, 'BUILDING EXHIBITION');
    await sleep(300);
    setLoad(100, '');
    await sleep(200);

    hideLoad();
    renderTimeline(star, tl, wiki, thumb, ytIds);
    document.getElementById('tlScreen').classList.add('on');
    const zd = document.getElementById('zoomDark');
    zd.style.opacity = '0';
    setTimeout(() => { zd.style.pointerEvents = 'none'; }, 600);

  } catch(err) {
    console.error(err);
    document.getElementById('lpErr').textContent = 'Could not load exhibition: ' + (err.message || 'Please try again');
    setLoad(0, 'ERROR');
    setTimeout(goHome, 3500);
  }
}

function goHome() {
  document.getElementById('tlScreen').classList.remove('on');
  document.getElementById('loadScreen').classList.remove('on');
  document.getElementById('mosaicScreen').style.display = 'block';
  const zd = document.getElementById('zoomDark');
  zd.style.opacity = '0';
  setTimeout(() => { zd.style.pointerEvents = 'none'; }, 500);
  mosaicActive = true;
  velX = 0; velY = 0;
  startLoop();
}
document.getElementById('tlBack').addEventListener('click', goHome);

// ══════════ API: CLAUDE ══════════
async function fetchTimeline(name) {
  const r = await fetch('/.netlify/functions/claude', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name })
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error||`Error ${r.status}`); }
  const data = await r.json();
  const raw = data.content?.find(b=>b.type==='text')?.text || '{}';
  return JSON.parse(raw.replace(/^```json\s*|^```\s*|```\s*$/gm,'').trim());
}

// ══════════ API: WIKIPEDIA IMAGES ══════════
async function fetchWikiImages(slug) {
  const s = slug.replace(/ /g,'_');
  const out = { thumb: null, images: [] };
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(s)}`);
    if (r.ok) { const d = await r.json(); out.thumb = d.thumbnail?.source || null; }
  } catch(e) {}
  try {
    const r = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(s)}&prop=images&imlimit=24&format=json&origin=*`);
    if (r.ok) {
      const d = await r.json();
      const pg = Object.values(d.query?.pages||{})[0];
      const files = (pg?.images||[])
        .filter(i=>/\.(jpg|jpeg|png)$/i.test(i.title))
        .filter(i=>!/icon|logo|flag|map|signature|commons|arrow|button|blank|edit|grey|gray|lock|ribbon|seal|stub/i.test(i.title))
        .slice(0,16).map(i=>i.title.replace('File:',''));
      const urls = await Promise.all(files.map(resolveImg));
      out.images = urls.filter(Boolean);
    }
  } catch(e) {}
  return out;
}

async function resolveImg(f) {
  try {
    const r = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=File:${encodeURIComponent(f)}&prop=imageinfo&iiprop=url&format=json&origin=*`);
    const d = await r.json();
    const url = Object.values(d.query?.pages||{})[0]?.imageinfo?.[0]?.url||null;
    return (url&&/\.(jpg|jpeg|png)$/i.test(url))?url:null;
  } catch(e){return null;}
}

// ══════════ YOUTUBE SEARCH ══════════
async function findYouTubeIds(searchTerms) {
  // Use YouTube's oEmbed-free approach via noembed for known IDs
  // Instead, we embed using youtube-nocookie search — client side no API key needed
  // Return search queries so we can use youtube's /results page embeds
  return searchTerms.slice(0,3);
}

function makeYTEmbed(searchQuery) {
  // Use YouTube's embed search feature
  const q = encodeURIComponent(searchQuery);
  return `https://www.youtube.com/embed?listType=search&list=${q}&rel=0&modestbranding=1`;
}

// ══════════ TIMELINE RENDER ══════════
let tlScale = 1;
let tlPanX = 0;
let tlPxPerYear = 160;
const MIN_SCALE = 0.4, MAX_SCALE = 2.5;

function renderTimeline(star, tl, wiki, heroThumb, ytSearchTerms) {
  const fullName = tl.fullName || star.name;
  const diedPart = tl.died ? ` – ${tl.died}` : '';
  document.getElementById('tlName').textContent = fullName;
  document.getElementById('tlMeta').textContent =
    [tl.born ? `${tl.born}${diedPart}` : '', (tl.fields||[]).join(' & '), tl.nationality].filter(Boolean).join(' · ');

  const stage = document.getElementById('tlStage');
  stage.innerHTML = '<div class="tl-spine-wrap"></div>';
  tlScale = 1; tlPanX = 0;

  const events = tl.events || [];
  if (!events.length) { stage.innerHTML += '<div style="padding:2rem;font-family:var(--serif);color:var(--muted);font-style:italic;">No timeline data available.</div>'; return; }

  // parse years
  const getYear = str => parseInt((str||'').toString().substring(0,4)) || 0;
  const bornY = getYear(tl.born);
  const diedY = tl.died ? getYear(tl.died) : (bornY + 70);
  const spanY = Math.max(diedY - bornY, 10);
  const allImgs = [heroThumb, wiki.thumb, ...wiki.images].filter((v,i,a) => v && a.indexOf(v) === i);

  const PAD = 120;
  const totalW = spanY * tlPxPerYear + PAD * 2;
  stage.style.width = totalW + 'px';
  stage.style.minWidth = totalW + 'px';

  // Year ticks every 5 years
  for (let y = bornY - (bornY % 5); y <= diedY + 5; y += 5) {
    const x = PAD + (y - bornY) * tlPxPerYear;
    if (x < 0 || x > totalW) continue;
    const tick = document.createElement('div');
    tick.className = 'tl-tick';
    tick.style.left = x + 'px';
    const lineH = y % 10 === 0 ? 14 : 8;
    tick.innerHTML = `<div class="tl-tick-line" style="height:${lineH}px"></div>${y%10===0?`<div class="tl-tick-year">${y}</div>`:''}`;
    stage.appendChild(tick);
  }

  // Birth cap
  addCap(stage, PAD, tl.born || bornY, 'BIRTH');
  // Death cap
  if (tl.died) {
    addCap(stage, PAD + (diedY - bornY) * tlPxPerYear, tl.died, 'DEATH');
  }

  // Events
  events.forEach((ev, i) => {
    const evYear = getYear(ev.year);
    const x = PAD + (evYear - bornY) * tlPxPerYear;
    const isUp = i % 2 === 0;
    const div = document.createElement('div');
    div.className = `tl-event ${isUp ? 'up' : 'down'}`;
    div.style.left = (x - 120) + 'px'; // centre card on event x

    // connector
    const connector = document.createElement('div');
    connector.className = 'tl-ev-connector';
    connector.style.cssText = `height:60px;`;
    div.appendChild(connector);

    const dot = document.createElement('div'); dot.className = 'tl-ev-dot'; div.appendChild(dot);

    const card = document.createElement('div'); card.className = 'tl-ev-card';

    // image
    const img = allImgs[i % allImgs.length] || null;
    if (img && ev.type !== 'death') {
      const ci = document.createElement('img');
      ci.className = 'tl-ev-img'; ci.src = img; ci.alt = ev.title;
      ci.onerror = () => ci.remove();
      card.appendChild(ci);
    }

    // YouTube on death/legacy events
    if ((ev.type === 'death' || i === events.length - 1) && ytSearchTerms?.length) {
      const ytSrc = makeYTEmbed(ytSearchTerms[0]);
      const yt = document.createElement('iframe');
      yt.className = 'tl-ev-yt';
      yt.src = ytSrc; yt.allowFullscreen = true; yt.loading = 'lazy';
      yt.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
      card.appendChild(yt);
    }

    const body = document.createElement('div'); body.className = 'tl-ev-body';
    body.innerHTML = `
      <div class="tl-ev-year">${ev.year||''}</div>
      <div class="tl-ev-type">${(ev.type||'').toUpperCase()}</div>
      <div class="tl-ev-title">${ev.title||''}</div>
      <div class="tl-ev-text">${ev.text||''}</div>
      ${ev.quote ? `<div class="tl-ev-quote">"${ev.quote.replace(/^[""\u201C\u201D]|[""\u201C\u201D]$/g,'')}"</div>` : ''}
    `;
    card.appendChild(body);
    div.appendChild(card);
    stage.appendChild(div);
  });

  // Scrubber
  const scrub = document.getElementById('tlScrub');
  scrub.innerHTML = '';
  events.forEach((ev, i) => {
    const si = document.createElement('div');
    si.className = 'tl-scrub-item';
    si.textContent = `${ev.year} ${(ev.title||'').substring(0,18)}`;
    si.addEventListener('click', () => {
      const evYear = getYear(ev.year);
      const targetX = PAD + (evYear - bornY) * tlPxPerYear * tlScale;
      const vp = document.getElementById('tlViewport');
      tlPanX = -(targetX - vp.clientWidth / 2);
      applyStageTransform();
    });
    scrub.appendChild(si);
    if (i < events.length - 1) { const sep = document.createElement('div'); sep.className = 'tl-scrub-sep'; scrub.appendChild(sep); }
  });

  // Start at birth
  tlPanX = -PAD + 80;
  applyStageTransform();
  setupTimelineDrag();
  setupZoomButtons(bornY, diedY);
}

function addCap(stage, x, year, label) {
  const cap = document.createElement('div');
  cap.className = 'tl-cap';
  cap.style.left = x + 'px';
  cap.innerHTML = `<div class="tl-cap-year">${year}</div><div class="tl-cap-dot"></div><div class="tl-cap-label">${label}</div>`;
  stage.appendChild(cap);
}

function applyStageTransform() {
  const stage = document.getElementById('tlStage');
  stage.style.transform = `translateX(${tlPanX}px) scaleX(${tlScale})`;
  stage.style.transformOrigin = 'left center';
}

function setupTimelineDrag() {
  const vp = document.getElementById('tlViewport');
  let drag = false, sx, spx;
  vp.addEventListener('mousedown', e => { drag = true; sx = e.clientX; spx = tlPanX; vp.style.cursor = 'grabbing'; });
  window.addEventListener('mousemove', e => { if (!drag) return; tlPanX = spx + (e.clientX - sx); applyStageTransform(); });
  window.addEventListener('mouseup', () => { drag = false; vp.style.cursor = ''; });
  // touch
  vp.addEventListener('touchstart', e => { drag = true; sx = e.touches[0].clientX; spx = tlPanX; }, {passive:true});
  vp.addEventListener('touchmove', e => { if (!drag) return; tlPanX = spx + (e.touches[0].clientX - sx); applyStageTransform(); }, {passive:true});
  vp.addEventListener('touchend', () => { drag = false; });
  // wheel to scroll
  vp.addEventListener('wheel', e => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      tlScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, tlScale * delta));
    } else {
      tlPanX -= e.deltaX || e.deltaY * 0.5;
    }
    applyStageTransform();
  }, {passive:false});
}

function setupZoomButtons(bornY, diedY) {
  document.getElementById('zoomIn').onclick = () => { tlScale = Math.min(MAX_SCALE, tlScale * 1.25); applyStageTransform(); };
  document.getElementById('zoomOut').onclick = () => { tlScale = Math.max(MIN_SCALE, tlScale * 0.8); applyStageTransform(); };
  document.getElementById('zoomReset').onclick = () => {
    const vp = document.getElementById('tlViewport');
    const span = diedY - bornY;
    tlScale = Math.max(MIN_SCALE, Math.min(1, (vp.clientWidth - 240) / (span * tlPxPerYear)));
    tlPanX = 60;
    applyStageTransform();
  };
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ══════════ INIT ══════════
initMosaic();
